name: Snyk Analysis

on:
  workflow_dispatch:
    inputs:
      branches:
        description: 'Photon branches to scan (comma-separated)'
        default: '3.0,4.0,5.0,6.0,common,dev,master'
      workingDir:
        description: 'Working directory containing photon-upstreams/ (default: $GITHUB_WORKSPACE/reports — matches package-report)'
        default: ''
      upstreamsDir:
        description: 'Override upstreams base dir (default: workingDir/photon-upstreams)'
        default: ''
      maxSubdirs:
        description: 'Cap packages scanned per branch (0 = no cap; useful for smoke tests)'
        default: '0'
      force:
        description: 'Re-scan packages whose log already exists'
        type: boolean
        default: false
      reparse:
        description: 'Re-import logs already in the SQLite DB'
        type: boolean
        default: false
      rebuild:
        description: 'Wipe runs+issues and re-parse from scratch (one-time recovery from the run_id corruption fix)'
        type: boolean
        default: false
      runAgentScan:
        description: 'Run snyk-agent-scan on cloned packages (extension; scans .claude/.cursor/.gemini/.codex/... dirs)'
        type: boolean
        default: true
      agentScanArgs:
        description: 'Extra args for snyk-agent-scan (e.g. --no-skills). --json + --dangerously-run-mcp-servers are always added.'
        default: ''
      agentScanForce:
        description: 'Re-run agent-scan for configs whose .json already exists'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  snyk-analysis:
    runs-on: self-hosted
    timeout-minutes: 2880

    steps:
      - name: Verify SNYK_TOKEN is configured
        env:
          # Pass the repo secret under a different name so it does not shadow
          # a host-env SNYK_TOKEN when the secret is empty (self-hosted runner).
          SNYK_TOKEN_SECRET: ${{ secrets.SNYK_TOKEN }}
        run: |
          if [ -n "${SNYK_TOKEN_SECRET:-}" ]; then
            echo "SNYK_TOKEN found in repo secret (length=${#SNYK_TOKEN_SECRET})"
          elif [ -n "${SNYK_TOKEN:-}" ]; then
            echo "SNYK_TOKEN found in runner env (length=${#SNYK_TOKEN})"
          else
            echo "::error::SNYK_TOKEN is set neither as a repo secret nor as a runner host env var."
            echo "::error::Get a token from https://app.snyk.io/account, then either:"
            echo "::error::  - add it under Settings -> Secrets and variables -> Actions, or"
            echo "::error::  - export it on the self-hosted runner (e.g. via \$HOME/actions-runner/.env, then restart)."
            exit 1
          fi

      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          path: repo
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout SnykAnalysis (sparse)
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            SnykAnalysis
          path: ci

      - name: Verify prerequisites
        run: |
          for cmd in pwsh sqlite3 curl tar; do
            if ! command -v "$cmd" &>/dev/null; then
              echo "::error::Missing required command: $cmd"
              exit 1
            fi
          done
          pwsh --version
          sqlite3 --version

      - name: Install / update Snyk CLI
        env:
          # Repo-secret value (may be empty); fall back to host-env SNYK_TOKEN.
          SNYK_TOKEN_SECRET: ${{ secrets.SNYK_TOKEN }}
        run: |
          # Resolve SNYK_TOKEN: repo secret wins, else use host env (already in scope on self-hosted runners).
          if [ -n "${SNYK_TOKEN_SECRET:-}" ]; then
            export SNYK_TOKEN="$SNYK_TOKEN_SECRET"
          fi
          if [ -z "${SNYK_TOKEN:-}" ]; then
            echo "::error::SNYK_TOKEN not resolved at run time."
            exit 1
          fi
          INSTALL_DIR="$HOME/.local/bin"
          mkdir -p "$INSTALL_DIR"
          export PATH="$INSTALL_DIR:$PATH"
          if ! command -v snyk &>/dev/null; then
            echo "Installing snyk CLI to $INSTALL_DIR/snyk"
            curl -fsSL --compressed -o "$INSTALL_DIR/snyk" https://static.snyk.io/cli/latest/snyk-linux
            chmod +x "$INSTALL_DIR/snyk"
          fi
          snyk --version
          # `snyk auth` is for caching the token to ~/.config/configstore/snyk.json;
          # the CLI also honours $SNYK_TOKEN from the environment on every call.
          # Skipping the auth network round-trip avoids hard-failing this step
          # when Snyk's auth service is in maintenance (SNYK-0099 / 503), as
          # observed in run 25603232753. SNYK_TOKEN is already exported above.
          if [ -f "$HOME/.config/configstore/snyk.json" ]; then
            echo "Using cached Snyk auth ($HOME/.config/configstore/snyk.json)"
          else
            echo "No cached Snyk auth; running 'snyk auth' (one-time, may fail under SNYK-0099)"
            snyk auth "$SNYK_TOKEN" || echo "::warning::snyk auth failed; SNYK_TOKEN env will be used at scan time instead"
          fi
          echo "$INSTALL_DIR" >> "$GITHUB_PATH"

      - name: Resolve directories
        id: dirs
        run: |
          WDIR="${{ github.event.inputs.workingDir }}"
          if [ -z "$WDIR" ]; then WDIR="${{ github.workspace }}/reports"; fi
          UDIR="${{ github.event.inputs.upstreamsDir }}"
          if [ -z "$UDIR" ]; then UDIR="$WDIR/photon-upstreams"; fi
          mkdir -p "$WDIR" "$UDIR"
          echo "workingDir=$WDIR"   >> "$GITHUB_OUTPUT"
          echo "upstreamsDir=$UDIR" >> "$GITHUB_OUTPUT"
          echo "## Snyk Analysis"               >> "$GITHUB_STEP_SUMMARY"
          echo ""                               >> "$GITHUB_STEP_SUMMARY"
          echo "| Parameter | Value |"          >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|"                      >> "$GITHUB_STEP_SUMMARY"
          echo "| branches | ${{ github.event.inputs.branches }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| workingDir | \`$WDIR\` |"     >> "$GITHUB_STEP_SUMMARY"
          echo "| upstreamsDir | \`$UDIR\` |"   >> "$GITHUB_STEP_SUMMARY"
          echo "| maxSubdirs | ${{ github.event.inputs.maxSubdirs }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| force | ${{ github.event.inputs.force }} |"   >> "$GITHUB_STEP_SUMMARY"
          echo "| reparse | ${{ github.event.inputs.reparse }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| runAgentScan | ${{ github.event.inputs.runAgentScan }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| agentScanArgs | \`${{ github.event.inputs.agentScanArgs }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| agentScanForce | ${{ github.event.inputs.agentScanForce }} |" >> "$GITHUB_STEP_SUMMARY"

      - name: Scan branches
        env:
          UDIR: ${{ steps.dirs.outputs.upstreamsDir }}
          BRANCHES: ${{ github.event.inputs.branches }}
          MAX_SUBDIRS: ${{ github.event.inputs.maxSubdirs }}
          FORCE: ${{ github.event.inputs.force }}
          # Snyk CLI honours SNYK_TOKEN env at every scan call; this is the
          # fallback if ~/.config/configstore/snyk.json was not populated
          # (e.g. when Snyk's auth service was in maintenance during install).
          SNYK_TOKEN_SECRET: ${{ secrets.SNYK_TOKEN }}
        run: |
          set +e
          if [ -n "${SNYK_TOKEN_SECRET:-}" ]; then
            export SNYK_TOKEN="$SNYK_TOKEN_SECRET"
          fi
          SCRIPT="ci/SnykAnalysis/Run-SnykOnSubdirs.ps1"
          missing=0; scanned=0
          # Per-branch status snippets get injected into each branch's report
          # in the "Generate reports" step. We do NOT write a top-level
          # "Per-branch scan status" table to the step summary anymore --
          # all status lives inside the per-branch collapsible.
          mkdir -p "$RUNNER_TEMP/branch_status"
          for B in $(echo "$BRANCHES" | tr ',' ' '); do
            CLONES="$UDIR/photon-$B/clones"
            SNIPPET="$RUNNER_TEMP/branch_status/branch_${B}.md"
            : > "$SNIPPET"
            echo "## Processing status (branch $B)"       >> "$SNIPPET"
            echo ""                                       >> "$SNIPPET"
            echo "| Step | Detail |"                      >> "$SNIPPET"
            echo "|---|---|"                              >> "$SNIPPET"
            if [ ! -d "$CLONES" ]; then
              echo "| SAST scan | \`$CLONES\` missing — skipped |" >> "$SNIPPET"
              missing=$((missing+1))
              continue
            fi
            COUNT=$(find "$CLONES" -mindepth 1 -maxdepth 1 -type d | wc -l)
            if [ "$COUNT" -eq 0 ]; then
              echo "| SAST scan | \`$CLONES\` empty — skipped |" >> "$SNIPPET"
              continue
            fi
            FORCE_FLAG=""; [ "$FORCE" = "true" ] && FORCE_FLAG="-Force"
            echo "::group::Branch $B ($COUNT subdirs)"
            pwsh -File "$SCRIPT" \
              -BaseDir "$CLONES" \
              -Branch "$B" \
              -MaxSubdirs "$MAX_SUBDIRS" \
              $FORCE_FLAG
            rc=$?
            echo "::endgroup::"
            STATUS=$([ $rc -eq 0 ] && echo "ok ($COUNT subdirs)" || echo "completed with failures (rc=$rc)")
            echo "| SAST scan | $STATUS |"                >> "$SNIPPET"
            scanned=$((scanned+1))
          done
          echo "scanned_branches=$scanned" >> "$GITHUB_OUTPUT"
          echo "missing_branches=$missing" >> "$GITHUB_OUTPUT"
          if [ "$scanned" -eq 0 ]; then
            echo "::error::No branches were scanned (all clones dirs missing or empty). Run package-report first to populate $UDIR."
            exit 1
          fi

      - name: Scan agent components with Snyk Agent Scan
        if: github.event.inputs.runAgentScan == 'true'
        env:
          UDIR: ${{ steps.dirs.outputs.upstreamsDir }}
          BRANCHES: ${{ github.event.inputs.branches }}
          MAX_SUBDIRS: ${{ github.event.inputs.maxSubdirs }}
          AGENT_FORCE: ${{ github.event.inputs.agentScanForce }}
          AGENT_ARGS: ${{ github.event.inputs.agentScanArgs }}
          SNYK_TOKEN_SECRET: ${{ secrets.SNYK_TOKEN }}
        run: |
          set +e
          if [ -n "${SNYK_TOKEN_SECRET:-}" ]; then
            export SNYK_TOKEN="$SNYK_TOKEN_SECRET"
          fi

          # Bootstrap uv (provides `uvx` to run snyk-agent-scan@latest without
          # a persistent install). Installs to ~/.local/bin -- same convention
          # the snyk CLI step uses.
          if ! command -v uv &>/dev/null; then
            echo "Installing uv to $HOME/.local/bin"
            curl -LsSf https://astral.sh/uv/install.sh | sh
          fi
          export PATH="$HOME/.local/bin:$PATH"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          uv --version

          STAMP=$(date -u +%Y%m%d_%H%M%S)
          # Dotdirs we recognise as agent-config containers. Order matters
          # only for tie-breaking in the SQLite report; otherwise each match
          # produces its own scan entry.
          AGENT_DIRS=( .claude .cursor .gemini .codex .windsurf .aider .amp .kiro .opencode )

          # The per-branch status snippet (started in "Scan branches") gets
          # a new row per branch for agent-scan coverage. Each snippet lands
          # inside that branch's report in "Generate reports".
          mkdir -p "$RUNNER_TEMP/branch_status"

          total_runs=0; total_failed=0
          for B in $(echo "$BRANCHES" | tr ',' ' '); do
            CLONES="$UDIR/photon-$B/clones"
            SNIPPET="$RUNNER_TEMP/branch_status/branch_${B}.md"
            # If the SAST step didn't create the snippet (e.g. dispatched
            # with this step alone), bootstrap a fresh one.
            if [ ! -f "$SNIPPET" ]; then
              {
                echo "## Processing status (branch $B)"
                echo ""
                echo "| Step | Detail |"
                echo "|---|---|"
              } > "$SNIPPET"
            fi
            if [ ! -d "$CLONES" ]; then
              echo "| Agent-scan coverage | _(clones dir missing)_ |" >> "$SNIPPET"
              continue
            fi

            # Build the find expression (dynamically -- one -name per AGENT_DIRS entry)
            FIND_EXPR=()
            for d in "${AGENT_DIRS[@]}"; do
              FIND_EXPR+=( -name "$d" -o )
            done
            unset 'FIND_EXPR[${#FIND_EXPR[@]}-1]'  # drop trailing -o

            # depth 4: catches both `clones/<pkg>/.claude` and the nested
            # `clones/<pkg>/<sub>/.claude` example (calico/goldmane case).
            mapfile -t MATCHES < <(find "$CLONES" -mindepth 2 -maxdepth 4 -type d \( "${FIND_EXPR[@]}" \) 2>/dev/null)
            n_found=${#MATCHES[@]}
            n_run=0; n_fail=0

            echo "::group::Branch $B: agent-scan over $n_found config dir(s)"
            for CFG in "${MATCHES[@]}"; do
              # Skip empty bin
              [ -d "$CFG" ] || continue

              # Derive: package = first path component below clones/
              REL="${CFG#$CLONES/}"
              PKG="${REL%%/*}"
              AGENT="$(basename "$CFG")"; AGENT="${AGENT#.}"

              # Apply maxSubdirs cap per branch
              if [ "$MAX_SUBDIRS" != "0" ] && [ "$n_run" -ge "$MAX_SUBDIRS" ]; then
                echo "  reached MAX_SUBDIRS=$MAX_SUBDIRS for $B; stopping"
                break
              fi

              PKG_ROOT="$CLONES/$PKG"
              LOG="$PKG_ROOT/${PKG}_agentscan_${B}_${AGENT}_${STAMP}.json"

              # Skip when a log already exists and force is false. Match SAST
              # step's idempotency via filename uniqueness.
              if [ "$AGENT_FORCE" != "true" ]; then
                EXISTING=$(find "$PKG_ROOT" -maxdepth 1 -name "${PKG}_agentscan_${B}_${AGENT}_*.json" -print -quit 2>/dev/null)
                if [ -n "$EXISTING" ]; then
                  echo "  skip $PKG/.$AGENT (already scanned: $(basename "$EXISTING"))"
                  continue
                fi
              fi

              echo "  scanning $PKG/.$AGENT -> $(basename "$LOG")"
              # `uvx snyk-agent-scan@latest scan` is the entrypoint; we add
              # --json for parsable output, --dangerously-run-mcp-servers
              # because the runner is non-interactive (per upstream README),
              # and --suppress-mcpserver-io=true to keep the log clean.
              # Any user-supplied $AGENT_ARGS go through last.
              uvx snyk-agent-scan@latest scan \
                  --json \
                  --dangerously-run-mcp-servers \
                  --suppress-mcpserver-io=true \
                  $AGENT_ARGS \
                  "$CFG" > "$LOG" 2> "${LOG%.json}.stderr"
              rc=$?
              if [ "$rc" -ne 0 ]; then
                echo "::warning::agent-scan rc=$rc for $PKG/.$AGENT (see stderr sibling)"
                n_fail=$((n_fail+1))
              fi
              n_run=$((n_run+1))
            done
            echo "::endgroup::"

            total_runs=$((total_runs + n_run))
            total_failed=$((total_failed + n_fail))
            echo "| Agent-scan coverage | configs found=$n_found, scans run=$n_run, failed=$n_fail |" >> "$SNIPPET"
          done
          echo "Total agent-scan runs: $total_runs (failed: $total_failed)"

      - name: Parse logs into SQLite
        env:
          UDIR: ${{ steps.dirs.outputs.upstreamsDir }}
          REPARSE: ${{ github.event.inputs.reparse }}
          REBUILD: ${{ github.event.inputs.rebuild }}
        run: |
          DB="ci/SnykAnalysis/snyk_issues.db"
          PARSE_ARGS=()
          [ "$REPARSE" = "true" ] && PARSE_ARGS+=("-Reparse")
          [ "$REBUILD" = "true" ] && PARSE_ARGS+=("-Rebuild")
          pwsh -File "ci/SnykAnalysis/Parse-SnykLogs.ps1" \
            -Directory "$UDIR" \
            -Database "$DB" \
            "${PARSE_ARGS[@]}"
          # Also import any agent-scan JSON outputs into the same DB.
          pwsh -File "ci/SnykAnalysis/Parse-AgentScanLogs.ps1" \
            -Directory "$UDIR" \
            -Database "$DB" \
            "${PARSE_ARGS[@]}"
          echo "DB_PATH=$DB" >> "$GITHUB_ENV"

      - name: Generate reports
        id: report
        run: |
          STAMP=$(date -u +%Y%m%d_%H%M%S)
          OUTDIR="ci/SnykAnalysis/scans"
          mkdir -p "$OUTDIR"

          # Combined report across all branches (markdown for the step summary,
          # JSON for downstream tooling).
          pwsh -File "ci/SnykAnalysis/Generate-SnykReport.ps1" \
            -Database "$DB_PATH" \
            -Format markdown \
            -ReportFile "$OUTDIR/SnykReport_${STAMP}.md"
          pwsh -File "ci/SnykAnalysis/Generate-SnykReport.ps1" \
            -Database "$DB_PATH" \
            -Format json \
            -ReportFile "$OUTDIR/SnykReport_${STAMP}.json"

          # Per-branch reports in three formats: txt (matches the requested
          # text layout), md (renders nicely in the step summary / on github
          # blob view), and json (programmatic consumers). Each per-branch
          # report inlines its own "Processing status" snippet (SAST status +
          # agent-scan coverage), assembled in the two scan steps above.
          for B in $(echo "${{ github.event.inputs.branches }}" | tr ',' ' '); do
            STATUS_FILE="$RUNNER_TEMP/branch_status/branch_${B}.md"
            STATUS_ARGS=()
            if [ -f "$STATUS_FILE" ]; then
              STATUS_ARGS=( -BranchStatusFile "$STATUS_FILE" )
            fi
            for FMT in text markdown json; do
              EXT=$(case "$FMT" in text) echo txt;; markdown) echo md;; json) echo json;; esac)
              pwsh -File "ci/SnykAnalysis/Generate-SnykReport.ps1" \
                -Database "$DB_PATH" \
                -Format "$FMT" \
                -Branch "$B" \
                -ReportFile "$OUTDIR/SnykReport_${B}_${STAMP}.${EXT}" \
                "${STATUS_ARGS[@]}" || true
            done
          done

          # Step summary: per-branch reports as the primary content, each in
          # a collapsible <details> block so the page stays navigable. The
          # "(all branches)" combined report is preserved as a file artifact
          # but no longer pasted into the step summary -- per request.
          echo ""                                               >> "$GITHUB_STEP_SUMMARY"
          for B in $(echo "${{ github.event.inputs.branches }}" | tr ',' ' '); do
            BRMD="$OUTDIR/SnykReport_${B}_${STAMP}.md"
            if [ -f "$BRMD" ]; then
              echo ""                                            >> "$GITHUB_STEP_SUMMARY"
              echo "<details><summary><b>Branch ${B}</b> — \`SnykReport_${B}_${STAMP}.{txt,md,json}\`</summary>" >> "$GITHUB_STEP_SUMMARY"
              echo ""                                            >> "$GITHUB_STEP_SUMMARY"
              cat "$BRMD"                                        >> "$GITHUB_STEP_SUMMARY"
              echo ""                                            >> "$GITHUB_STEP_SUMMARY"
              echo "</details>"                                  >> "$GITHUB_STEP_SUMMARY"
            else
              echo "**Branch ${B}**: no report generated"        >> "$GITHUB_STEP_SUMMARY"
            fi
          done

          echo "report_stamp=$STAMP" >> "$GITHUB_OUTPUT"
          echo "report_dir=$OUTDIR"  >> "$GITHUB_OUTPUT"

      - name: Stage per-package logs for artifact
        if: always()
        env:
          UDIR: ${{ steps.dirs.outputs.upstreamsDir }}
          STAMP: ${{ steps.report.outputs.report_stamp }}
        run: |
          # Gather the per-package raw outputs into a single staging dir so
          # the upload step can pick them up with a relative-path glob. The
          # files live scattered across <upstreamsDir>/photon-*/clones/<pkg>/
          # which may be on an absolute path (custom workingDir) that
          # upload-artifact can't follow. Copy under the staged subtree.
          STAGE="ci/SnykAnalysis/scans/per-package-logs"
          mkdir -p "$STAGE"
          # Per-package Snyk SAST logs (one .log per scanned package).
          count_snyk=$(find "$UDIR" -name '*_snyk_*.log' -print 2>/dev/null \
                       -exec cp --parents -t "$STAGE/" {} \; | wc -l)
          # Per-(package,agent) Snyk Agent Scan JSON + sibling stderr.
          count_agent=$(find "$UDIR" -name '*_agentscan_*.json' -print 2>/dev/null \
                        -exec cp --parents -t "$STAGE/" {} \; | wc -l)
          find "$UDIR" -name '*_agentscan_*.stderr' \
              -exec cp --parents -t "$STAGE/" {} \; 2>/dev/null || true
          echo "Staged $count_snyk per-package Snyk logs and $count_agent agent-scan JSON files into $STAGE"
          du -sh "$STAGE" 2>/dev/null

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: snyk-analysis-${{ steps.report.outputs.report_stamp }}
          path: |
            ci/SnykAnalysis/scans/SnykReport_*.txt
            ci/SnykAnalysis/scans/SnykReport_*.md
            ci/SnykAnalysis/scans/SnykReport_*.json
            ci/SnykAnalysis/scans/per-package-logs/**
            ci/SnykAnalysis/snyk_issues.db
          retention-days: 90
          if-no-files-found: warn

      - name: Commit reports + DB to repo
        if: always()
        run: |
          DEST="repo/SnykAnalysis/scans"
          mkdir -p "$DEST"
          cp ci/SnykAnalysis/scans/SnykReport_*.txt  "$DEST/" 2>/dev/null || true
          cp ci/SnykAnalysis/scans/SnykReport_*.md   "$DEST/" 2>/dev/null || true
          cp ci/SnykAnalysis/scans/SnykReport_*.json "$DEST/" 2>/dev/null || true
          cp ci/SnykAnalysis/snyk_issues.db          "repo/SnykAnalysis/" 2>/dev/null || true
          cd repo
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add SnykAnalysis/scans/ SnykAnalysis/snyk_issues.db
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Snyk analysis $(date -u +%Y-%m-%d)"
            # Other workflows (e.g. package-classifier, package-report) commit
            # to scans/ in parallel; rebase before push to avoid the
            # non-fast-forward rejection that previously failed run 25603659225.
            git pull --rebase origin master
            git push
          fi
