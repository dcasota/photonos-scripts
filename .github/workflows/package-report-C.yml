name: Photon OS Package Report (C-side parity)

# Phase 8 task 081. Runs the C port of photonos-package-report against
# the working state captured by the PS-side workflow, diffs the .prn
# outputs, and appends a row to tools/parity-journal.tsv.
#
# Triggers:
#   - workflow_run on success of "Photon OS Package Report"
#   - workflow_dispatch with explicit snapshot run id (manual replay)
#
# This workflow does NOT produce production .prn files; the PS workflow
# remains the source-of-truth until Phase 9 retirement.

on:
  workflow_run:
    workflows: ["Photon OS Package Report"]
    types: [completed]
  workflow_dispatch:
    inputs:
      snapshot_run_id:
        description: 'PS run id whose parity-snapshot-<id> artifact to consume'
        required: true
      upstreams_exclusion_list:
        description: 'Comma-separated substrings (case-insensitive). Must mirror the PS workflow value so both sides skip the same clones. See package-report.yml for semantics.'
        default: 'firmware,chromium'
      throttle_limit:
        description: 'Concurrency for CheckURLHealth (sequential clones on-demand at -ThrottleLimit 1 take many hours for full multi-branch snapshots). Drop to 1 when chasing a strict-diff that needs byte-stable stderr ordering.'
        default: '8'

permissions:
  contents: write   # commit the journal back to master
  actions:  read    # download artifact from the triggering workflow

jobs:
  parity:
    # Only run on success of upstream PS workflow (or on manual dispatch).
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: self-hosted
    timeout-minutes: 480

    steps:
      - name: Determine PS run id
        id: ps_run
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ID="${{ github.event.inputs.snapshot_run_id }}"
          else
            ID="${{ github.event.workflow_run.id }}"
          fi
          if [ -z "$ID" ]; then
            echo "::error::Could not resolve PS run id"; exit 1
          fi
          echo "id=$ID" >> "$GITHUB_OUTPUT"
          echo "Resolved PS run id: $ID"

      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          path: repo
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install build deps
        run: |
          # Idempotent: tdnf install reports "already installed" cleanly.
          tdnf install -y cmake gcc libcurl-devel pcre2-devel pkg-config make tar gzip git || true
          cmake --version
          gcc --version | head -1

      - name: Build C binary
        run: |
          cd repo/photonos-package-report/photonos-package-report
          cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel
          ls -lh build/photonos-package-report

      - name: Clean snapshot download dir
        run: |
          # download-artifact does not clean its target dir; on the
          # self-hosted runner snapshot-raw/ accumulates tarballs from
          # prior C runs. Remove it so only this run's tarball is
          # present (defence-in-depth alongside the exact-name select
          # in Extract snapshot).
          rm -rf snapshot-raw

      - name: Download parity snapshot
        id: dl
        uses: actions/download-artifact@v5
        with:
          name: parity-snapshot-${{ steps.ps_run.outputs.id }}
          path: snapshot-raw
          run-id: ${{ steps.ps_run.outputs.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract snapshot
        id: extract
        run: |
          # ROOT CAUSE of the 2026-05-19/20 stale-snapshot incidents:
          # the download-artifact step writes into snapshot-raw/ WITHOUT
          # cleaning it, so tarballs from previous C runs accumulate
          # there. The old `ls ../snapshot-raw/*.tar.gz | head -1` then
          # picked the ALPHABETICALLY-FIRST tarball — i.e. the smallest
          # (oldest) run id, e.g. parity-snapshot-25991871716.tar.gz
          # (the May 17 baseline) — regardless of which PS run actually
          # triggered this C run. Every diff since silently used the
          # May 17 snapshot.
          #
          # Fix: clean both dirs AND select the tarball by the exact
          # resolved PS run id.
          rm -rf snapshot
          mkdir -p snapshot
          cd snapshot
          PS_RID="${{ steps.ps_run.outputs.id }}"
          TAR="../snapshot-raw/parity-snapshot-${PS_RID}.tar.gz"
          if [ ! -f "$TAR" ]; then
            # Fall back to newest-by-mtime if the exact-name file isn't
            # present (e.g. artifact naming drift), but log loudly.
            echo "::warning::exact tarball $TAR not found; falling back to newest"
            TAR=$(ls -t ../snapshot-raw/*.tar.gz | head -1)
          fi
          echo "Using snapshot tarball: $TAR (PS run $PS_RID)"
          tar -xzf "$TAR"
          ls -la
          if [ ! -s prn-snapshot ] || [ -z "$(ls prn-snapshot/*.prn 2>/dev/null)" ]; then
            echo "::error::snapshot has no prn-snapshot/*.prn — nothing to diff"
            exit 1
          fi
          # Even within a freshly-extracted tarball, the PS workflow may
          # have included multiple `.prn` files per branch when its own
          # STAGING dir accumulated files across runs. Keep only the
          # NEWEST per branch so the parity-diff for-loop doesn't
          # double-count.
          #
          # CRITICAL: dedup by the FILENAME-embedded timestamp
          # (photonos-urlhealth-<branch>_<YYYYMMDDHHMM>.prn), NOT by
          # file mtime. `tar -xzf` gives every extracted file the same
          # mtime, so `ls -t` ties arbitrarily — in practice it kept the
          # OLDEST filename, making the journal record the wrong (stale)
          # PS file's diff (see the 2026-05-20 dedup-by-mtime incident,
          # run 26140575536: journal recorded 425 = the 09:20 file while
          # the true 05:54 file gave 366). Lexical sort of the
          # zero-padded YYYYMMDDHHMM suffix is correct chronological order.
          for branch in $(ls prn-snapshot/photonos-urlhealth-*.prn 2>/dev/null \
                          | sed -E 's|.*photonos-urlhealth-(.+)_[0-9]+\.prn|\1|' \
                          | sort -u); do
            keep=$(ls -1 prn-snapshot/photonos-urlhealth-"$branch"_*.prn 2>/dev/null \
                   | sort | tail -1)
            for f in $(ls -1 prn-snapshot/photonos-urlhealth-"$branch"_*.prn 2>/dev/null); do
              if [ "$f" != "$keep" ]; then
                echo "  dropping stale: $f (keeping $keep)"
                rm -f "$f"
              fi
            done
          done
          echo "Files after filename-timestamp dedup:"
          ls prn-snapshot/photonos-urlhealth-*.prn
          echo "Files after dedup:"; ls prn-snapshot/photonos-urlhealth-*.prn
          echo "dir=$(pwd)" >> "$GITHUB_OUTPUT"

      - name: Reconstruct working tree from manifests
        id: reconstruct
        run: |
          WDIR="${RUNNER_TEMP:-/tmp}/parity-c-wd"
          UPSTREAMS="$WDIR/photon-upstreams"
          SCRIPT="repo/.github/scripts/parity-reconstruct.sh"
          chmod +x "$SCRIPT" || true
          "$SCRIPT" "${{ steps.extract.outputs.dir }}" "$WDIR" "$UPSTREAMS"
          echo "wdir=$WDIR" >> "$GITHUB_OUTPUT"
          echo "upstreams=$UPSTREAMS" >> "$GITHUB_OUTPUT"

      - name: Determine enabled branches from snapshot
        id: branches
        run: |
          # PS files in the snapshot follow: photonos-urlhealth-<branch>_<YYYYMMDDHHMM>.prn
          SNAP="${{ steps.extract.outputs.dir }}"
          BRANCHES=$(ls "$SNAP"/prn-snapshot/photonos-urlhealth-*.prn 2>/dev/null \
                     | sed -E 's|.*photonos-urlhealth-(.+)_[0-9]+\.prn|\1|' \
                     | sort -u)
          echo "Branches in snapshot:"
          printf '  %s\n' $BRANCHES

          PH3=false; PH4=false; PH5=false; PH6=false
          COMMON=false; DEV=false; MASTER=false
          for b in $BRANCHES; do
            case "$b" in
              3.0)    PH3=true ;;
              4.0)    PH4=true ;;
              5.0)    PH5=true ;;
              6.0)    PH6=true ;;
              common) COMMON=true ;;
              dev)    DEV=true ;;
              master) MASTER=true ;;
            esac
          done
          {
            echo "ph3=$PH3"
            echo "ph4=$PH4"
            echo "ph5=$PH5"
            echo "ph6=$PH6"
            echo "common=$COMMON"
            echo "dev=$DEV"
            echo "master=$MASTER"
          } >> "$GITHUB_OUTPUT"

      - name: Run C binary
        id: c_run
        env:
          GITHUB_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
          # check_urlhealth() gates all network work (urlhealth HEAD
          # probes + pr_clone_ensure tag-detect chain) on this env var
          # so ctest stays offline-hermetic by default. CI parity NEEDS
          # the network paths to run — without it, cols 4/5/6/7/10 are
          # all empty on the C side and every row diffs strict.
          PR_TEST_NETWORK: "1"
        run: |
          cd repo/photonos-package-report/photonos-package-report
          WDIR="${{ steps.reconstruct.outputs.wdir }}"
          UPSTREAMS="${{ steps.reconstruct.outputs.upstreams }}"
          SCANS="$WDIR/scans"
          mkdir -p "$SCANS"

          # Mirror the PS workflow's exclusion list so both sides skip
          # the same clones (firmware ~55 GB, chromium ~67 GB per branch).
          # On workflow_run (auto), inputs context is empty → fall back
          # to the same baseline default as PS.
          UPSTREAMS_EXCL="${{ github.event.inputs.upstreams_exclusion_list }}"
          if [ -z "$UPSTREAMS_EXCL" ]; then
            UPSTREAMS_EXCL="firmware,chromium"
          fi

          # ADR-0009 originally pinned -ThrottleLimit 1 for byte-stable
          # stderr ordering. In practice the snapshot manifest carries
          # ~4000 specs with .git Source0 — on-demand clones serially
          # exceed the 8-hour workflow timeout. parity-diff.sh only
          # compares .prn output (which is already byte-stable via
          # FRD-013 sort + single-writer regardless of throttle), so
          # we can safely parallelise the runtime. Drop back to 1 via
          # workflow_dispatch input when chasing a strict-diff that
          # needs deterministic stderr.
          THROTTLE="${{ github.event.inputs.throttle_limit }}"
          if [ -z "$THROTTLE" ]; then
            THROTTLE="8"
          fi

          # Token is read from $GITHUB_TOKEN env (env_or() default in
          # main.c L101). Passing it as -github_token would leak the
          # value into the runner's ps(1) output for the lifetime of
          # the binary — env vars are scoped to the process and not
          # visible in argv.
          ./build/photonos-package-report \
            -workingDir   "$WDIR" \
            -upstreamsDir "$UPSTREAMS" \
            -scansDir     "$SCANS" \
            -ThrottleLimit "$THROTTLE" \
            -UpstreamsExclusionList "$UPSTREAMS_EXCL" \
            -GeneratePh3URLHealthReport      "${{ steps.branches.outputs.ph3 }}" \
            -GeneratePh4URLHealthReport      "${{ steps.branches.outputs.ph4 }}" \
            -GeneratePh5URLHealthReport      "${{ steps.branches.outputs.ph5 }}" \
            -GeneratePh6URLHealthReport      "${{ steps.branches.outputs.ph6 }}" \
            -GeneratePhCommonURLHealthReport "${{ steps.branches.outputs.common }}" \
            -GeneratePhDevURLHealthReport    "${{ steps.branches.outputs.dev }}" \
            -GeneratePhMasterURLHealthReport "${{ steps.branches.outputs.master }}" \
            -GeneratePhPackageReport         "false"

          echo "scans=$SCANS" >> "$GITHUB_OUTPUT"
          ls -l "$SCANS"

      # M05 (FRD-017): preserve C-side .prn for post-hoc strict-diff
      # investigation. The runner cleans _temp/ at job end, so without
      # this upload the .prn that parity-diff judged is lost. `always()`
      # ensures we get the artifact even if parity-diff fails — that's
      # exactly when it's most needed. Retention matches ADR-0009's
      # 30-day soft window.
      - name: Upload C-side .prn
        if: always() && steps.c_run.outputs.scans != ''
        uses: actions/upload-artifact@v4
        with:
          name: c-side-prn-${{ github.run_id }}
          path: ${{ steps.c_run.outputs.scans }}/photonos-urlhealth-*.prn
          if-no-files-found: warn
          retention-days: 30

      - name: Run parity-diff per branch
        id: diff
        run: |
          SNAP="${{ steps.extract.outputs.dir }}"
          PS_DIR="$SNAP/prn-snapshot"
          C_DIR="${{ steps.c_run.outputs.scans }}"
          DIFF="repo/photonos-package-report/photonos-package-report/tools/parity-diff.sh"
          JNL="repo/photonos-package-report/photonos-package-report/tools/parity-journal.tsv"
          APPEND="repo/photonos-package-report/photonos-package-report/tools/parity-journal-append.sh"
          PS_RID="${{ steps.ps_run.outputs.id }}"
          C_RID="${{ github.run_id }}"

          chmod +x "$DIFF" "$APPEND" || true

          {
            echo "# Parity diff verdict"
            echo
            echo "| Branch | Verdict | Strict rows | Soft rows |"
            echo "|--------|---------|-------------|-----------|"
          } >> "$GITHUB_STEP_SUMMARY"

          overall="green"
          for ps_prn in "$PS_DIR"/photonos-urlhealth-*.prn; do
            [ -f "$ps_prn" ] || continue
            base=$(basename "$ps_prn")
            branch=$(echo "$base" | sed -E 's|photonos-urlhealth-(.+)_[0-9]+\.prn|\1|')
            c_prn=$(ls -t "$C_DIR"/photonos-urlhealth-"$branch"_*.prn 2>/dev/null | head -1)
            if [ -z "$c_prn" ]; then
              echo "::error::parity-diff: no C output for branch $branch"
              "$APPEND" "$JNL" "$PS_RID" "$C_RID" "$branch" 1 0 strict
              overall="strict"
              echo "| $branch | **strict** | n/a | n/a (no C output) |" >> "$GITHUB_STEP_SUMMARY"
              continue
            fi

            # The diff script exits 1 on strict but we want to keep going.
            result=$("$DIFF" "$ps_prn" "$c_prn" -q 2>/dev/null) || true
            verdict=$(echo "$result" | awk '{print $1}')
            strict=$(echo "$result" | awk '{print $2}')
            soft=$(echo "$result"   | awk '{print $3}')

            "$APPEND" "$JNL" "$PS_RID" "$C_RID" "$branch" "${strict:-0}" "${soft:-0}" "${verdict:-strict}"

            case "$verdict" in
              strict) overall="strict" ;;
              soft)   [ "$overall" = "green" ] && overall="soft" ;;
            esac

            echo "| $branch | $verdict | $strict | $soft |" >> "$GITHUB_STEP_SUMMARY"
          done

          {
            echo
            echo "**Overall: \`$overall\`**"
            echo
            echo "PS run [\`$PS_RID\`](https://github.com/${{ github.repository }}/actions/runs/$PS_RID) · C run \`$C_RID\`"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "overall=$overall" >> "$GITHUB_OUTPUT"

      - name: Commit journal
        if: always() && steps.diff.outputs.overall != ''
        run: |
          cd repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add photonos-package-report/photonos-package-report/tools/parity-journal.tsv
          if git diff --cached --quiet; then
            echo "No journal changes to commit"
          else
            git commit -m "parity: PS=${{ steps.ps_run.outputs.id }} C=${{ github.run_id }} overall=${{ steps.diff.outputs.overall }}"
            # Retry push with rebase: concurrent master pushes (doc commits,
            # PS scans-commit) can advance the branch between fetch and push.
            for attempt in 1 2 3 4 5; do
              if git push; then
                echo "journal push ok (attempt $attempt)"
                break
              fi
              echo "journal push rejected, rebasing (attempt $attempt)"
              git pull --rebase --autostash origin "$(git rev-parse --abbrev-ref HEAD)" || true
              sleep $(( attempt * 3 ))
            done
          fi
