name: Upstream Source Code Dependency Scanner

on:
  workflow_dispatch:
    inputs:
      branches:
        description: 'Photon OS branches to scan (comma-separated)'
        default: '3.0,4.0,5.0,6.0,master,dev,common'
      workingDir:
        description: 'Working directory for branch clones (photon-3.0/, photon-4.0/, etc.). Default: /mnt/d/Users/Public'
        default: '/mnt/d/Users/Public'
      upstreamsDir:
        description: 'Upstreams base directory (default: workingDir/photon-upstreams). Per-branch subdirs: clones/'
        default: ''
      scansDir:
        description: 'Directory for .prn report files (default: workingDir/scans)'
        default: ''
      sourcesDir:
        description: 'Directory for source tarballs (default: workingDir/photon_sources/1.0)'
        default: ''
      patch_specs:
        description: 'Generate patched spec files with missing declarations'
        type: boolean
        default: true

jobs:
  deep-scan:
    runs-on: self-hosted
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          path: repo
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout scanner source (sparse)
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            upstream-source-code-dependency-scanner
          path: ci

      - name: Install build dependencies
        run: |
          echo "## Environment" >> "$GITHUB_STEP_SUMMARY"
          cat /etc/photon-release 2>/dev/null | tee -a "$GITHUB_STEP_SUMMARY" || true
          gcc --version | head -1 | tee -a "$GITHUB_STEP_SUMMARY"
          cmake --version | head -1 | tee -a "$GITHUB_STEP_SUMMARY"

          for pkg in cmake gcc json-c-devel json-c; do
            if ! rpm -q "$pkg" &>/dev/null; then
              tdnf install -y "$pkg"
            fi
          done

      - name: Build upstream-dep-scanner
        run: |
          cd ci/upstream-source-code-dependency-scanner
          mkdir -p build && cd build
          cmake ..
          make -j$(nproc) 2>&1 | tail -5
          echo "Build complete"

      - name: Run scan per branch
        id: scan
        run: |
          DATETIME=$(date -u +%Y%m%d_%H%M%S)
          echo "datetime=$DATETIME" >> "$GITHUB_OUTPUT"

          BRANCHES="${{ github.event.inputs.branches || '3.0,4.0,5.0,6.0,master,dev,common' }}"
          WORKING_DIR="${{ github.event.inputs.workingDir || '/mnt/d/Users/Public' }}"

          # Upstreams directory: default to workingDir/photon-upstreams
          UPSTREAMS_BASE="${{ github.event.inputs.upstreamsDir }}"
          if [ -z "$UPSTREAMS_BASE" ]; then
            UPSTREAMS_BASE="${WORKING_DIR}/photon-upstreams"
          fi

          # Scans directory: default to workingDir/scans
          SCANS_DIR="${{ github.event.inputs.scansDir }}"
          if [ -z "$SCANS_DIR" ]; then
            SCANS_DIR="${WORKING_DIR}/scans"
          fi

          # Sources directory: default to workingDir/photon_sources/1.0
          SOURCES_DIR="${{ github.event.inputs.sourcesDir }}"
          if [ -z "$SOURCES_DIR" ]; then
            SOURCES_DIR="${WORKING_DIR}/photon_sources/1.0"
          fi

          PATCH_SPECS="${{ github.event.inputs.patch_specs }}"
          SCANNER="ci/upstream-source-code-dependency-scanner/build/upstream-dep-scanner"
          DATA_DIR="ci/upstream-source-code-dependency-scanner/data"
          OUTPUT_BASE="/tmp/upstream-dep-scanner-output"

          echo "## Upstream Source Code Dependency Scanner" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Scan date: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Parameter | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Branches | ${BRANCHES} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| workingDir | ${WORKING_DIR} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| upstreamsDir | ${UPSTREAMS_BASE} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| scansDir | ${SCANS_DIR} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| sourcesDir | ${SOURCES_DIR} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          TOTAL_PATCHED=0
          TOTAL_ISSUES=0
          TOTAL_SCANNED=0

          for BRANCH in $(echo "$BRANCHES" | tr ',' ' '); do
            SAFE_BRANCH=$(echo "$BRANCH" | tr '/' '-')
            OUTPUT_DIR="${OUTPUT_BASE}/${SAFE_BRANCH}"
            BRANCH_REPO="${WORKING_DIR}/photon-${BRANCH}"
            UPSTREAMS_DIR="${UPSTREAMS_BASE}/photon-${BRANCH}"

            echo "=== Branch: ${BRANCH} ==="

            rm -rf "${OUTPUT_DIR}"
            mkdir -p "${OUTPUT_DIR}"

            # Use the branch repo SPECS from workingDir/photon-{branch}/SPECS
            SPECS_DIR="${BRANCH_REPO}/SPECS"
            if [ ! -d "$SPECS_DIR" ]; then
              echo "  WARNING: Branch repo not found at ${BRANCH_REPO}, falling back to sparse clone"
              CLONE_DIR="/tmp/photon-clone-${SAFE_BRANCH}"
              if [ ! -d "$CLONE_DIR" ]; then
                git clone --depth 1 --branch "$BRANCH" --filter=blob:none --sparse \
                  https://github.com/vmware/photon.git "$CLONE_DIR" 2>&1 | tail -1
                cd "$CLONE_DIR" && git sparse-checkout set SPECS && cd -
              else
                cd "$CLONE_DIR" && git pull --ff-only 2>/dev/null || true && cd -
              fi
              SPECS_DIR="${CLONE_DIR}/SPECS"
            fi

            SPEC_COUNT=$(find "${SPECS_DIR}" -name '*.spec' 2>/dev/null | wc -l)
            echo "  Specs dir: ${SPECS_DIR}"
            echo "  Specs: ${SPEC_COUNT}"

            if [ "$SPEC_COUNT" -eq 0 ]; then
              echo "| ${BRANCH} | 0 | - | - | - | skipped |" >> "$GITHUB_STEP_SUMMARY"
              continue
            fi

            ARGS="--specs-dir ${SPECS_DIR}"
            ARGS="${ARGS} --output-dir ${OUTPUT_DIR}"
            ARGS="${ARGS} --data-dir ${DATA_DIR}"
            ARGS="${ARGS} --branch ${BRANCH}"
            ARGS="${ARGS} --json"

            # Find the latest PRN file for this branch
            # 1. scansDir (primary, matches package-report output location)
            # 2. repo checkout (fallback to committed PRN files)
            PRN_FILE=$(ls -t "${SCANS_DIR}"/photonos-urlhealth-${BRANCH}_*.prn 2>/dev/null | head -1)
            if [ -z "$PRN_FILE" ]; then
              PRN_FILE=$(ls -t repo/photonos-package-report/scans/photonos-urlhealth-${BRANCH}_*.prn 2>/dev/null | head -1)
            fi
            if [ -n "$PRN_FILE" ]; then
              ARGS="${ARGS} --prn-file ${PRN_FILE}"
              echo "  PRN file: ${PRN_FILE}"
            else
              echo "  PRN file: not found (package->clone mapping will use heuristics)"
            fi

            if [ -d "${UPSTREAMS_DIR}/clones" ]; then
              ARGS="${ARGS} --upstreams-dir ${UPSTREAMS_DIR}"
              echo "  Upstreams: ${UPSTREAMS_DIR}"
            else
              echo "  Upstreams: not found at ${UPSTREAMS_DIR}, running Phase 1 only"
            fi

            # SPECS_NEW directory for latest version analysis
            SPECS_NEW_DIR="${UPSTREAMS_DIR}/SPECS_NEW"
            if [ -d "${SPECS_NEW_DIR}" ]; then
              ARGS="${ARGS} --specs-new-dir ${SPECS_NEW_DIR}"
              echo "  SPECS_NEW: ${SPECS_NEW_DIR}"
            fi

            # Source tarballs directory for current release analysis
            if [ -d "${SOURCES_DIR}" ]; then
              ARGS="${ARGS} --sources-dir ${SOURCES_DIR}"
              echo "  Sources: ${SOURCES_DIR}"
            fi

            if [ "$PATCH_SPECS" != "false" ]; then
              ARGS="${ARGS} --patch-specs"
            fi

            $SCANNER $ARGS 2>&1 | tee "/tmp/upstream-dep-scanner-${SAFE_BRANCH}.log"

            MANIFEST=$(ls "${OUTPUT_DIR}"/depfix-manifest-*.json 2>/dev/null | head -1)
            if [ -n "$MANIFEST" ] && [ -f "$MANIFEST" ]; then
              STATS=$(python3 -c "
          import json
          d = json.load(open('${MANIFEST}'))
          m = d['metadata']
          s = d['severity_summary']
          patched = m['specs_patched']
          issues = s['critical'] + s['important'] + s['informational']
          print(f\"{m['specs_scanned']} {patched} {issues} {s['critical']} {s['important']} {s['informational']}\")
          " 2>/dev/null)

              if [ -n "$STATS" ]; then
                read SCANNED PATCHED ISSUES CRIT IMP INFO <<< "$STATS"
                TOTAL_PATCHED=$((TOTAL_PATCHED + PATCHED))
                TOTAL_ISSUES=$((TOTAL_ISSUES + ISSUES))
                TOTAL_SCANNED=$((TOTAL_SCANNED + SCANNED))

                echo "" >> "$GITHUB_STEP_SUMMARY"
                echo "### Branch ${BRANCH}" >> "$GITHUB_STEP_SUMMARY"
                echo "" >> "$GITHUB_STEP_SUMMARY"
                echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
                echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
                echo "| Specs scanned | ${SCANNED} |" >> "$GITHUB_STEP_SUMMARY"
                echo "| Specs patched | ${PATCHED} |" >> "$GITHUB_STEP_SUMMARY"
                echo "| Critical | ${CRIT} |" >> "$GITHUB_STEP_SUMMARY"
                echo "| Important | ${IMP} |" >> "$GITHUB_STEP_SUMMARY"
                echo "| Informational | ${INFO} |" >> "$GITHUB_STEP_SUMMARY"

                if [ "$PATCHED" -gt 0 ]; then
                  echo "" >> "$GITHUB_STEP_SUMMARY"
                  echo "<details><summary>Patched specs (${PATCHED})</summary>" >> "$GITHUB_STEP_SUMMARY"
                  echo "" >> "$GITHUB_STEP_SUMMARY"
                  python3 -c "
          import json
          d = json.load(open('${MANIFEST}'))
          for p in d['patched_specs']:
              adds = ', '.join([a['value'] for a in p['additions']])
              print(f\"- **{p['package']}**: {adds}\")
          " >> "$GITHUB_STEP_SUMMARY" 2>/dev/null
                  echo "" >> "$GITHUB_STEP_SUMMARY"
                  echo "</details>" >> "$GITHUB_STEP_SUMMARY"
                fi

              fi
            fi
          done

          # Write the findings summary section
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "---" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Findings Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Total specs scanned | ${TOTAL_SCANNED} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Total specs patched | ${TOTAL_PATCHED} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Total issues | ${TOTAL_ISSUES} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "---" >> "$GITHUB_STEP_SUMMARY"
          echo "*Generated by [upstream-source-code-dependency-scanner](upstream-source-code-dependency-scanner/)*" >> "$GITHUB_STEP_SUMMARY"

          echo "total_patched=$TOTAL_PATCHED" >> "$GITHUB_OUTPUT"
          echo "total_issues=$TOTAL_ISSUES" >> "$GITHUB_OUTPUT"
          FILE_COUNT=$(find "${OUTPUT_BASE}" -name '*.json' 2>/dev/null | wc -l)
          echo "file_count=$FILE_COUNT" >> "$GITHUB_OUTPUT"

      - name: Upload scan results
        if: steps.scan.outputs.file_count != '0'
        uses: actions/upload-artifact@v7
        with:
          name: upstream-dep-scanner-${{ steps.scan.outputs.datetime }}
          path: |
            /tmp/upstream-dep-scanner-output/**/depfix-manifest-*.json
            /tmp/upstream-dep-scanner-output/**/dependency-graph-*-deep-*.json
            /tmp/upstream-dep-scanner-output/**/SPECS_DEPFIX/**
          retention-days: 90

      - name: Cleanup
        if: always()
        run: |
          rm -rf /tmp/upstream-dep-scanner-output /tmp/photon-clone-* /tmp/upstream-dep-scanner-*.log
