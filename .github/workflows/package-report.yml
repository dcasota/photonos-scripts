name: Photon OS Package Report

on:
  workflow_dispatch:
    inputs:
      report_type:
        description: 'Report type to generate'
        type: choice
        options:
          - all
          - urlhealth
          - package
          - diff
        default: 'all'
      branches:
        description: 'Branches for URL health (comma-separated)'
        default: '3.0,4.0,5.0,6.0,common,dev,master'
      urlhealth_branches:
        description: 'Override: enable only these URL health branches (comma-separated, empty=use branches input)'
        default: ''
      workingDir:
        description: 'Working directory for branch clones and upstreams (default: $HOME)'
        default: ''
      upstreamsDir:
        description: 'Upstreams base directory (default: workingDir/photon-upstreams). Per-branch subdirs: clones, SOURCES_NEW, SPECS_NEW, SOURCES_KojiFedora'
        default: ''
      scansDir:
        description: 'Directory for .prn report output files (default: workingDir/scans)'
        default: ''
  schedule:
    # Weekly scan on Sunday at 02:00 UTC
    - cron: '0 2 * * 0'

env:
  REPORT_DIR: ${{ github.workspace }}/reports

jobs:
  package-report:
    runs-on: self-hosted
    timeout-minutes: 2880

    steps:
      - name: Checkout CI tooling
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            photonos-package-report
          path: ci

      - name: Checkout full repo for commit
        uses: actions/checkout@v4
        with:
          path: repo
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure PowerShell is installed
        run: |
          if ! command -v pwsh &>/dev/null; then
            echo "Installing PowerShell via tdnf..."
            tdnf install -y powershell
          fi
          pwsh --version

      - name: Ensure git and tar are available
        run: |
          for cmd in git tar; do
            if ! command -v "$cmd" &>/dev/null; then
              echo "::error::Required command '$cmd' not found"
              exit 1
            fi
          done
          git --version
          tar --version | head -1

      - name: Check disk space
        run: |
          df -h | grep -E 'Filesystem|/mnt/|/$'

      - name: Prepare report directory
        run: mkdir -p "$REPORT_DIR"

      - name: Determine report flags
        id: flags
        run: |
          REPORT_TYPE="${{ github.event.inputs.report_type || 'all' }}"
          BRANCHES="${{ github.event.inputs.branches || '3.0,4.0,5.0,6.0,common,dev,master' }}"
          UH_OVERRIDE="${{ github.event.inputs.urlhealth_branches }}"

          # Default all to false
          PH3_UH=false; PH4_UH=false; PH5_UH=false; PH6_UH=false
          COMMON_UH=false; DEV_UH=false; MASTER_UH=false
          PKG=false; DIFF_CM=false; DIFF_56=false; DIFF_45=false; DIFF_34=false

          # Determine which URL health branches to enable
          if [ "$REPORT_TYPE" = "all" ] || [ "$REPORT_TYPE" = "urlhealth" ]; then
            UH_LIST="${UH_OVERRIDE:-$BRANCHES}"
            for b in $(echo "$UH_LIST" | tr ',' ' '); do
              case "$b" in
                3.0)    PH3_UH=true ;;
                4.0)    PH4_UH=true ;;
                5.0)    PH5_UH=true ;;
                6.0)    PH6_UH=true ;;
                common) COMMON_UH=true ;;
                dev)    DEV_UH=true ;;
                master) MASTER_UH=true ;;
              esac
            done
          fi

          if [ "$REPORT_TYPE" = "all" ] || [ "$REPORT_TYPE" = "package" ]; then
            PKG=true
          fi

          if [ "$REPORT_TYPE" = "all" ] || [ "$REPORT_TYPE" = "diff" ]; then
            DIFF_CM=true; DIFF_56=true; DIFF_45=true; DIFF_34=true
          fi

          # Write outputs
          {
            echo "ph3_uh=$PH3_UH"
            echo "ph4_uh=$PH4_UH"
            echo "ph5_uh=$PH5_UH"
            echo "ph6_uh=$PH6_UH"
            echo "common_uh=$COMMON_UH"
            echo "dev_uh=$DEV_UH"
            echo "master_uh=$MASTER_UH"
            echo "pkg=$PKG"
            echo "diff_cm=$DIFF_CM"
            echo "diff_56=$DIFF_56"
            echo "diff_45=$DIFF_45"
            echo "diff_34=$DIFF_34"
            echo "report_type=$REPORT_TYPE"
          } >> "$GITHUB_OUTPUT"

      - name: Snapshot existing .prn files
        id: snapshot
        run: |
          SCANS="${{ github.event.inputs.scansDir }}"
          if [ -z "$SCANS" ]; then
            WDIR="${{ github.event.inputs.workingDir }}"
            if [ -z "$WDIR" ]; then WDIR="$REPORT_DIR"; fi
            SCANS="$WDIR/scans"
          fi
          mkdir -p "$SCANS"
          MANIFEST="/tmp/prn-before-run.txt"
          find "$SCANS" -maxdepth 1 -name '*.prn' -type f -printf '%f\n' | sort > "$MANIFEST"
          echo "manifest=$MANIFEST" >> "$GITHUB_OUTPUT"
          echo "scans_dir=$SCANS" >> "$GITHUB_OUTPUT"
          echo "Pre-existing .prn files: $(wc -l < "$MANIFEST")"

      - name: Run package report
        id: run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLAB_FREEDESKTOP_ORG_USERNAME: ${{ secrets.GITLAB_FREEDESKTOP_ORG_USERNAME || 'ci-runner' }}
          GITLAB_FREEDESKTOP_ORG_TOKEN: ${{ secrets.GITLAB_FREEDESKTOP_ORG_TOKEN || 'none' }}
        run: |
          SCRIPT="ci/photonos-package-report/photonos-package-report.ps1"

          # Use custom workingDir if provided, otherwise default to REPORT_DIR
          WDIR="${{ github.event.inputs.workingDir }}"
          if [ -z "$WDIR" ]; then
            WDIR="$REPORT_DIR"
          fi

          # Build optional directory arguments
          EXTRA_ARGS=""
          if [ -n "${{ github.event.inputs.upstreamsDir }}" ]; then
            EXTRA_ARGS="$EXTRA_ARGS -upstreamsDir \"${{ github.event.inputs.upstreamsDir }}\""
          fi
          if [ -n "${{ github.event.inputs.scansDir }}" ]; then
            EXTRA_ARGS="$EXTRA_ARGS -scansDir \"${{ github.event.inputs.scansDir }}\""
          fi

          eval pwsh -File "$SCRIPT" \
            -workingDir "$WDIR" \
            $EXTRA_ARGS \
            -GeneratePh3URLHealthReport        "${{ steps.flags.outputs.ph3_uh }}" \
            -GeneratePh4URLHealthReport        "${{ steps.flags.outputs.ph4_uh }}" \
            -GeneratePh5URLHealthReport        "${{ steps.flags.outputs.ph5_uh }}" \
            -GeneratePh6URLHealthReport        "${{ steps.flags.outputs.ph6_uh }}" \
            -GeneratePhCommonURLHealthReport   "${{ steps.flags.outputs.common_uh }}" \
            -GeneratePhDevURLHealthReport      "${{ steps.flags.outputs.dev_uh }}" \
            -GeneratePhMasterURLHealthReport   "${{ steps.flags.outputs.master_uh }}" \
            -GeneratePhPackageReport           "${{ steps.flags.outputs.pkg }}" \
            -GeneratePhCommontoPhMasterDiffHigherPackageVersionReport "${{ steps.flags.outputs.diff_cm }}" \
            -GeneratePh5toPh6DiffHigherPackageVersionReport          "${{ steps.flags.outputs.diff_56 }}" \
            -GeneratePh4toPh5DiffHigherPackageVersionReport          "${{ steps.flags.outputs.diff_45 }}" \
            -GeneratePh3toPh4DiffHigherPackageVersionReport          "${{ steps.flags.outputs.diff_34 }}"

          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Generate summary
        if: always()
        run: |
          python3 << 'SUMMARY_EOF'
          import os, glob

          manifest_path = "${{ steps.snapshot.outputs.manifest }}"
          scans_dir = "${{ steps.snapshot.outputs.scans_dir }}"
          report_type = "${{ steps.flags.outputs.report_type }}"

          pre_existing = set()
          if os.path.exists(manifest_path):
              with open(manifest_path) as f:
                  pre_existing = {line.strip() for line in f if line.strip()}

          all_prn = sorted(glob.glob(os.path.join(scans_dir, '*.prn')))
          prn_files = [f for f in all_prn if os.path.basename(f) not in pre_existing]

          summary_path = os.environ.get('GITHUB_STEP_SUMMARY', '/dev/null')
          with open(summary_path, 'a') as s:
              s.write("# Photon OS Package Report\n\n")
              s.write(f"**Report type**: {report_type}  \n")
              s.write(f"**Files generated**: {len(prn_files)}\n\n")

              if prn_files:
                  s.write("## Generated Reports\n\n")
                  s.write("| File | Size |\n")
                  s.write("|------|------|\n")
                  for f in prn_files:
                      name = os.path.basename(f)
                      size = os.path.getsize(f)
                      if size > 1024*1024:
                          size_str = f"{size/1024/1024:.1f} MB"
                      elif size > 1024:
                          size_str = f"{size/1024:.1f} KB"
                      else:
                          size_str = f"{size} B"
                      s.write(f"| `{name}` | {size_str} |\n")
                  s.write("\n")
              else:
                  s.write("::warning::No .prn report files were generated.\n\n")

              s.write("---\n*Full reports available in the `package-reports` artifact.*\n")

          print(f"Summary written: {len(prn_files)} report files found")
          SUMMARY_EOF

      - name: Collect new reports
        if: always()
        id: collect
        run: |
          SCANS="${{ steps.snapshot.outputs.scans_dir }}"
          MANIFEST="${{ steps.snapshot.outputs.manifest }}"
          STAGING="/tmp/new-reports"
          mkdir -p "$STAGING"

          NEW_COUNT=0
          for f in "$SCANS"/*.prn; do
            [ -f "$f" ] || continue
            BASENAME="$(basename "$f")"
            if ! grep -qxF "$BASENAME" "$MANIFEST"; then
              cp "$f" "$STAGING/"
              NEW_COUNT=$((NEW_COUNT + 1))
              echo "  NEW: $BASENAME"
            fi
          done

          echo "new_count=$NEW_COUNT" >> "$GITHUB_OUTPUT"
          echo "staging=$STAGING" >> "$GITHUB_OUTPUT"
          echo "New .prn files from this run: $NEW_COUNT"

      - name: Upload report artifacts
        if: always() && steps.collect.outputs.new_count != '0'
        uses: actions/upload-artifact@v4
        with:
          name: package-reports
          path: /tmp/new-reports/*.prn
          retention-days: 90
          if-no-files-found: warn

      - name: Commit reports to scans directory
        if: always() && steps.collect.outputs.new_count != '0'
        run: |
          STAGING="${{ steps.collect.outputs.staging }}"
          SCANS_DIR="repo/photonos-package-report/scans"
          mkdir -p "$SCANS_DIR"
          cp "$STAGING"/*.prn "$SCANS_DIR/"
          cd repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add photonos-package-report/scans/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update package report scans $(date -u +%Y-%m-%d)"
            git push
          fi
