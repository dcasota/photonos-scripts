name: Photon OS Package Report

on:
  workflow_dispatch:
    inputs:
      report_type:
        description: 'Report type to generate'
        type: choice
        options:
          - all
          - urlhealth
          - package
          - diff
        default: 'all'
      branches:
        description: 'Branches for URL health (comma-separated)'
        default: '3.0,4.0,5.0,6.0,common,dev,master'
      urlhealth_branches:
        description: 'Override: enable only these URL health branches (comma-separated, empty=use branches input)'
        default: ''
      workingDir:
        description: 'Working directory for branch clones and upstreams (default: $HOME)'
        default: ''
      upstreamsDir:
        description: 'Upstreams base directory (default: workingDir/photon-upstreams). Per-branch subdirs: clones, SOURCES_NEW, SPECS_NEW, SOURCES_KojiFedora'
        default: ''
      scansDir:
        description: 'Directory for .prn report output files (default: workingDir/scans)'
        default: ''
      upstreams_exclusion_list:
        description: 'Comma-separated substrings (case-insensitive). Matched against TWO keys: (1) leaf of $UpdateDownloadFile (skips tarball fetch into SOURCES_NEW); (2) $repoName from *.git URL (skips clone creation under clones/). Substitution + urlhealth still run; tag detection falls back to non-git path. Default skips firmware (~55 GB/branch) and chromium (~67 GB/branch).'
        default: 'firmware,chromium'
  schedule:
    # Weekly scan on Sunday at 02:00 UTC
    - cron: '0 2 * * 0'

env:
  REPORT_DIR: ${{ github.workspace }}/reports

jobs:
  package-report:
    runs-on: self-hosted
    timeout-minutes: 2880

    steps:
      - name: Checkout CI tooling
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            photonos-package-report
          path: ci

      - name: Checkout full repo for commit
        uses: actions/checkout@v6
        with:
          path: repo
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure PowerShell is installed
        run: |
          if ! command -v pwsh &>/dev/null; then
            echo "Installing PowerShell via tdnf..."
            tdnf install -y powershell
          fi
          pwsh --version

      - name: Ensure git and tar are available
        run: |
          for cmd in git tar; do
            if ! command -v "$cmd" &>/dev/null; then
              echo "::error::Required command '$cmd' not found"
              exit 1
            fi
          done
          git --version
          tar --version | head -1

      - name: Check disk space
        run: |
          df -h | grep -E 'Filesystem|/mnt/|/$'

      - name: Prepare report directory
        run: mkdir -p "$REPORT_DIR"

      - name: Determine report flags
        id: flags
        run: |
          REPORT_TYPE="${{ github.event.inputs.report_type || 'all' }}"
          BRANCHES="${{ github.event.inputs.branches || '3.0,4.0,5.0,6.0,common,dev,master' }}"
          UH_OVERRIDE="${{ github.event.inputs.urlhealth_branches }}"

          # Default all to false
          PH3_UH=false; PH4_UH=false; PH5_UH=false; PH6_UH=false
          COMMON_UH=false; DEV_UH=false; MASTER_UH=false
          PKG=false; DIFF_CM=false; DIFF_56=false; DIFF_45=false; DIFF_34=false

          # Determine which URL health branches to enable
          if [ "$REPORT_TYPE" = "all" ] || [ "$REPORT_TYPE" = "urlhealth" ]; then
            UH_LIST="${UH_OVERRIDE:-$BRANCHES}"
            for b in $(echo "$UH_LIST" | tr ',' ' '); do
              case "$b" in
                3.0)    PH3_UH=true ;;
                4.0)    PH4_UH=true ;;
                5.0)    PH5_UH=true ;;
                6.0)    PH6_UH=true ;;
                common) COMMON_UH=true ;;
                dev)    DEV_UH=true ;;
                master) MASTER_UH=true ;;
              esac
            done
          fi

          if [ "$REPORT_TYPE" = "all" ] || [ "$REPORT_TYPE" = "package" ]; then
            PKG=true
          fi

          if [ "$REPORT_TYPE" = "all" ] || [ "$REPORT_TYPE" = "diff" ]; then
            DIFF_CM=true; DIFF_56=true; DIFF_45=true; DIFF_34=true
          fi

          # Write outputs
          {
            echo "ph3_uh=$PH3_UH"
            echo "ph4_uh=$PH4_UH"
            echo "ph5_uh=$PH5_UH"
            echo "ph6_uh=$PH6_UH"
            echo "common_uh=$COMMON_UH"
            echo "dev_uh=$DEV_UH"
            echo "master_uh=$MASTER_UH"
            echo "pkg=$PKG"
            echo "diff_cm=$DIFF_CM"
            echo "diff_56=$DIFF_56"
            echo "diff_45=$DIFF_45"
            echo "diff_34=$DIFF_34"
            echo "report_type=$REPORT_TYPE"
          } >> "$GITHUB_OUTPUT"

      - name: Snapshot existing .prn files
        id: snapshot
        run: |
          SCANS="${{ github.event.inputs.scansDir }}"
          if [ -z "$SCANS" ]; then
            WDIR="${{ github.event.inputs.workingDir }}"
            if [ -z "$WDIR" ]; then WDIR="$REPORT_DIR"; fi
            SCANS="$WDIR/scans"
          fi
          mkdir -p "$SCANS"
          # Clean any pre-existing .prn files so the snapshot tarball
          # picked up by the C-side workflow contains only the outputs
          # generated by THIS run. Otherwise the self-hosted runner's
          # persistent scans/ accumulates files across runs, the
          # "collect new reports" step finds N+M files where M are
          # stale, and the C workflow's parity-diff loop iterates
          # over both — corrupting journal numbers. See the stale-
          # snapshot incident on 2026-05-19 (run 26101453292) for the
          # canonical example. We keep .md issue files for now.
          MOVED=$(find "$SCANS" -maxdepth 1 -name '*.prn' -type f | wc -l)
          if [ "$MOVED" -gt 0 ]; then
            ARCHIVE="$SCANS/.archive-$(date -u +%Y%m%d%H%M%S)"
            mkdir -p "$ARCHIVE"
            find "$SCANS" -maxdepth 1 -name '*.prn' -type f -exec mv {} "$ARCHIVE/" \;
            echo "Archived $MOVED pre-existing .prn file(s) to $ARCHIVE"
          fi
          MANIFEST="/tmp/prn-before-run.txt"
          find "$SCANS" -maxdepth 1 -name '*.prn' -type f -printf '%f\n' | sort > "$MANIFEST"
          echo "manifest=$MANIFEST" >> "$GITHUB_OUTPUT"
          echo "scans_dir=$SCANS" >> "$GITHUB_OUTPUT"
          echo "Pre-existing .prn files after archive: $(wc -l < "$MANIFEST")"

      - name: Run package report
        id: run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Pass repo-secret values under "_SECRET" names so an empty secret
          # does not shadow a host-env value of the same name on the
          # self-hosted runner. Coalesce in bash below: secret > host env >
          # literal fallback. These credentials are optional — when none of
          # the three sources is set the script falls back to 'ci-runner'/'none'
          # and runs in degraded mode (no GitLab API access).
          GITLAB_FREEDESKTOP_ORG_USERNAME_SECRET: ${{ secrets.GITLAB_FREEDESKTOP_ORG_USERNAME }}
          GITLAB_FREEDESKTOP_ORG_TOKEN_SECRET: ${{ secrets.GITLAB_FREEDESKTOP_ORG_TOKEN }}
        run: |
          # Resolve GitLab credentials: repo secret > runner host env > literal fallback.
          if [ -n "${GITLAB_FREEDESKTOP_ORG_USERNAME_SECRET:-}" ]; then
            export GITLAB_FREEDESKTOP_ORG_USERNAME="$GITLAB_FREEDESKTOP_ORG_USERNAME_SECRET"
          fi
          if [ -z "${GITLAB_FREEDESKTOP_ORG_USERNAME:-}" ]; then
            export GITLAB_FREEDESKTOP_ORG_USERNAME="ci-runner"
          fi
          if [ -n "${GITLAB_FREEDESKTOP_ORG_TOKEN_SECRET:-}" ]; then
            export GITLAB_FREEDESKTOP_ORG_TOKEN="$GITLAB_FREEDESKTOP_ORG_TOKEN_SECRET"
          fi
          if [ -z "${GITLAB_FREEDESKTOP_ORG_TOKEN:-}" ]; then
            export GITLAB_FREEDESKTOP_ORG_TOKEN="none"
          fi

          SCRIPT="ci/photonos-package-report/photonos-package-report.ps1"

          # Use custom workingDir if provided, otherwise default to REPORT_DIR
          WDIR="${{ github.event.inputs.workingDir }}"
          if [ -z "$WDIR" ]; then
            WDIR="$REPORT_DIR"
          fi

          # Build optional directory arguments
          EXTRA_ARGS=""
          if [ -n "${{ github.event.inputs.upstreamsDir }}" ]; then
            EXTRA_ARGS="$EXTRA_ARGS -upstreamsDir \"${{ github.event.inputs.upstreamsDir }}\""
          fi
          if [ -n "${{ github.event.inputs.scansDir }}" ]; then
            EXTRA_ARGS="$EXTRA_ARGS -scansDir \"${{ github.event.inputs.scansDir }}\""
          fi
          # On workflow_dispatch the input is filled in by the user
          # (default in the inputs block). On schedule there is no
          # inputs context, so apply the same baseline default here.
          UPSTREAMS_EXCL="${{ github.event.inputs.upstreams_exclusion_list }}"
          if [ -z "$UPSTREAMS_EXCL" ] && [ "${{ github.event_name }}" = "schedule" ]; then
            UPSTREAMS_EXCL="firmware,chromium"
          fi
          if [ -n "$UPSTREAMS_EXCL" ]; then
            EXTRA_ARGS="$EXTRA_ARGS -UpstreamsExclusionList \"$UPSTREAMS_EXCL\""
          fi

          # Propagate pwsh's exit code. Previously a trailing `echo "exit_code=$?"`
          # always succeeded, so `bash -e` saw a clean step regardless of the
          # PowerShell script aborting (e.g. Write-Error on insufficient disk
          # in run 25670305654 produced a false-positive successful run).
          eval pwsh -File "$SCRIPT" \
            -workingDir "$WDIR" \
            $EXTRA_ARGS \
            -GeneratePh3URLHealthReport        "${{ steps.flags.outputs.ph3_uh }}" \
            -GeneratePh4URLHealthReport        "${{ steps.flags.outputs.ph4_uh }}" \
            -GeneratePh5URLHealthReport        "${{ steps.flags.outputs.ph5_uh }}" \
            -GeneratePh6URLHealthReport        "${{ steps.flags.outputs.ph6_uh }}" \
            -GeneratePhCommonURLHealthReport   "${{ steps.flags.outputs.common_uh }}" \
            -GeneratePhDevURLHealthReport      "${{ steps.flags.outputs.dev_uh }}" \
            -GeneratePhMasterURLHealthReport   "${{ steps.flags.outputs.master_uh }}" \
            -GeneratePhPackageReport           "${{ steps.flags.outputs.pkg }}" \
            -GeneratePhCommontoPhMasterDiffHigherPackageVersionReport "${{ steps.flags.outputs.diff_cm }}" \
            -GeneratePh5toPh6DiffHigherPackageVersionReport          "${{ steps.flags.outputs.diff_56 }}" \
            -GeneratePh4toPh5DiffHigherPackageVersionReport          "${{ steps.flags.outputs.diff_45 }}" \
            -GeneratePh3toPh4DiffHigherPackageVersionReport          "${{ steps.flags.outputs.diff_34 }}"
          rc=$?
          echo "exit_code=$rc" >> "$GITHUB_OUTPUT"
          if [ "$rc" -ne 0 ]; then
            echo "::error::photonos-package-report.ps1 exited with code $rc"
            exit "$rc"
          fi

      - name: Generate summary
        if: always()
        run: |
          python3 << 'SUMMARY_EOF'
          import os, glob

          manifest_path = "${{ steps.snapshot.outputs.manifest }}"
          scans_dir = "${{ steps.snapshot.outputs.scans_dir }}"
          report_type = "${{ steps.flags.outputs.report_type }}"

          pre_existing = set()
          if os.path.exists(manifest_path):
              with open(manifest_path) as f:
                  pre_existing = {line.strip() for line in f if line.strip()}

          all_prn = sorted(glob.glob(os.path.join(scans_dir, '*.prn')))
          prn_files = [f for f in all_prn if os.path.basename(f) not in pre_existing]

          summary_path = os.environ.get('GITHUB_STEP_SUMMARY', '/dev/null')
          with open(summary_path, 'a') as s:
              s.write("# Photon OS Package Report\n\n")
              s.write(f"**Report type**: {report_type}  \n")
              s.write(f"**Files generated**: {len(prn_files)}\n\n")

              if prn_files:
                  s.write("## Generated Reports\n\n")
                  s.write("| File | Size |\n")
                  s.write("|------|------|\n")
                  for f in prn_files:
                      name = os.path.basename(f)
                      size = os.path.getsize(f)
                      if size > 1024*1024:
                          size_str = f"{size/1024/1024:.1f} MB"
                      elif size > 1024:
                          size_str = f"{size/1024:.1f} KB"
                      else:
                          size_str = f"{size} B"
                      s.write(f"| `{name}` | {size_str} |\n")
                  s.write("\n")
              else:
                  s.write("::warning::No .prn report files were generated.\n\n")

              s.write("---\n*Full reports available in the `package-reports` artifact.*\n")

          print(f"Summary written: {len(prn_files)} report files found")
          SUMMARY_EOF

      - name: Generate URL health issue summaries
        if: always()
        run: |
          SCANS="${{ steps.snapshot.outputs.scans_dir }}"
          SCRIPT="repo/.github/scripts/generate-urlhealth-summary.py"
          if [ -f "$SCRIPT" ]; then
            python3 "$SCRIPT" "$SCANS"
          else
            echo "::warning::URL health summary script not found at $SCRIPT"
          fi

      - name: Collect new reports
        if: always()
        id: collect
        run: |
          SCANS="${{ steps.snapshot.outputs.scans_dir }}"
          MANIFEST="${{ steps.snapshot.outputs.manifest }}"
          STAGING="/tmp/new-reports"
          # Clean STAGING first. On the self-hosted runner /tmp/new-reports
          # persists across runs; without this the staging dir accumulates
          # every PS run's .prn files, and the parity-snapshot tarball then
          # bundles all of them (e.g. four 5.0 files from four runs). The
          # downstream C workflow has to dedup, and a single bug there
          # (mtime ties) silently selects the wrong PS file. Cleaning here
          # makes the snapshot contain exactly this run's outputs. See the
          # 2026-05-20 staging-accumulation incident.
          rm -rf "$STAGING"
          mkdir -p "$STAGING"

          NEW_COUNT=0
          for f in "$SCANS"/*.prn; do
            [ -f "$f" ] || continue
            BASENAME="$(basename "$f")"
            if ! grep -qxF "$BASENAME" "$MANIFEST"; then
              cp "$f" "$STAGING/"
              NEW_COUNT=$((NEW_COUNT + 1))
              echo "  NEW: $BASENAME"
            fi
          done

          # Also collect generated .md issue summaries
          for f in "$SCANS"/photonos-urlhealth-issues-*.md; do
            [ -f "$f" ] || continue
            cp "$f" "$STAGING/"
            echo "  NEW: $(basename "$f")"
          done

          echo "new_count=$NEW_COUNT" >> "$GITHUB_OUTPUT"
          echo "staging=$STAGING" >> "$GITHUB_OUTPUT"
          echo "New .prn files from this run: $NEW_COUNT"

      - name: Capture parity snapshot
        if: always() && steps.collect.outputs.new_count != '0'
        id: parity_snapshot
        run: |
          # Phase 8 task 080 (ADR-0009, FRD-016): freeze the PS-side input
          # state so the C-side workflow can replay against bit-identical
          # inputs. The artifact carries manifests (clone SHAs, tarball
          # sha256s) + the .prn outputs PS produced — not the working-tree
          # bytes themselves (those are reconstructible from the manifests).
          WDIR="${{ github.event.inputs.workingDir }}"
          [ -z "$WDIR" ] && WDIR="$REPORT_DIR"
          UPSTREAMS="${{ github.event.inputs.upstreamsDir }}"
          [ -z "$UPSTREAMS" ] && UPSTREAMS="$WDIR/photon-upstreams"
          STAGING="${{ steps.collect.outputs.staging }}"

          OUT="/tmp/parity-snapshot-${{ github.run_id }}.tar.gz"
          SCRIPT="repo/.github/scripts/parity-snapshot.sh"
          chmod +x "$SCRIPT" || true

          "$SCRIPT" "$WDIR" "$UPSTREAMS" "$STAGING" "$OUT"
          echo "tar=$OUT" >> "$GITHUB_OUTPUT"

      - name: Preserve SOURCES_NEW to shared col9 cache (M64 / ADR-0009)
        if: always()
        run: |
          # TODO-1: persist ONLY the downloaded tarballs (not PS's full
          # clones) to a stable path the C workflow reads, so PS and C hash
          # byte-identical bytes and col9 stops drifting on regenerated
          # github/gitlab auto-archives. Overwrite (latest PS bytes win);
          # the auto-triggered C run reads these immediately after.
          WDIR="${{ github.event.inputs.workingDir }}"; [ -z "$WDIR" ] && WDIR="$REPORT_DIR"
          UPSTREAMS="${{ github.event.inputs.upstreamsDir }}"; [ -z "$UPSTREAMS" ] && UPSTREAMS="$WDIR/photon-upstreams"
          SHARED="${PR_SHA_CACHE_BASE:-$HOME/.cache/photonos-shared/photon-upstreams}"
          mkdir -p "$SHARED"
          n=0
          for d in "$UPSTREAMS"/photon-*/SOURCES_NEW; do
            [ -d "$d" ] || continue
            br=$(basename "$(dirname "$d")")
            mkdir -p "$SHARED/$br/SOURCES_NEW"
            cp -a "$d/." "$SHARED/$br/SOURCES_NEW/" 2>/dev/null && n=$((n+1)) || true
          done
          # Disk cap (LRU by mtime): keep the shared tarball cache bounded.
          CAP_MB=50000
          cur=$(du -sm "$SHARED" 2>/dev/null | cut -f1)
          if [ "${cur:-0}" -gt "$CAP_MB" ]; then
            echo "shared col9 cache ${cur}MB > ${CAP_MB}MB — pruning tarballs older than 21d"
            find "$SHARED" -type f -name '*.tar.*' -mtime +21 -delete 2>/dev/null || true
          fi
          echo "preserved $n branch SOURCES_NEW dirs; shared cache now $(du -sh "$SHARED" 2>/dev/null | cut -f1)"

      - name: Upload parity snapshot artifact
        if: always() && steps.parity_snapshot.outputs.tar != ''
        uses: actions/upload-artifact@v7
        with:
          # Name embeds the PS run id so the C workflow can find it via
          # the workflow_run.id payload field. Retention matches the
          # ADR-0009 90-day clock plus 5 days slack.
          name: parity-snapshot-${{ github.run_id }}
          path: ${{ steps.parity_snapshot.outputs.tar }}
          retention-days: 95
          if-no-files-found: warn

      - name: Upload report artifacts
        if: always() && steps.collect.outputs.new_count != '0'
        uses: actions/upload-artifact@v7
        with:
          name: package-reports
          path: |
            /tmp/new-reports/*.prn
            /tmp/new-reports/*.md
          retention-days: 90
          if-no-files-found: warn

      - name: Commit reports to scans directory
        if: always() && steps.collect.outputs.new_count != '0'
        run: |
          STAGING="${{ steps.collect.outputs.staging }}"
          SCANS_DIR="repo/photonos-package-report/scans"
          mkdir -p "$SCANS_DIR"
          cp "$STAGING"/*.prn "$SCANS_DIR/" 2>/dev/null || true
          cp "$STAGING"/*.md "$SCANS_DIR/" 2>/dev/null || true
          cd repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add photonos-package-report/scans/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update package report scans $(date -u +%Y-%m-%d)"
            # Retry push with rebase: concurrent jobs (C-side journal,
            # doc commits) can advance master between fetch and push.
            for attempt in 1 2 3 4 5; do
              if git push; then
                echo "push ok (attempt $attempt)"
                break
              fi
              echo "push rejected, rebasing (attempt $attempt)"
              git pull --rebase --autostash origin "$(git rev-parse --abbrev-ref HEAD)" || true
              sleep $(( attempt * 3 ))
            done
          fi
