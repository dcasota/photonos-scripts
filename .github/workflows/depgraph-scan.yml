name: Dependency Graph Scan

on:
  workflow_dispatch:
    inputs:
      branches:
        description: 'Photon OS branches to scan (comma-separated)'
        default: '3.0,4.0,5.0,6.0,common,master,dev'
  schedule:
    # Weekly scan on Monday at 03:00 UTC
    - cron: '0 3 * * 1'

jobs:
  depgraph:
    runs-on: self-hosted
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          path: repo
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout CI tooling (sparse)
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            tdnf-depgraph
          path: ci

      - name: Install build dependencies
        run: |
          echo "## Environment" >> "$GITHUB_STEP_SUMMARY"
          tdnf --version | tee -a "$GITHUB_STEP_SUMMARY"
          cat /etc/photon-release | tee -a "$GITHUB_STEP_SUMMARY"

          # Self-healing install. The simple `tdnf install -y <pkg>` path
          # is enough most of the time, but Photon's major version bumps
          # (e.g. rpm 4.18 -> 6.0.1 on 2026-05-11) leave orphan dependents
          # like `drpm` whose old ABI (librpm.so.9) blocks the upgrade --
          # the solver refuses, reporting "providers can't be installed".
          # `--allowerasing` lets tdnf remove the orphan(s) so the upgrade
          # proceeds (e.g. drpm is dropped and createrepo_c upgrades to a
          # version that no longer needs it).
          install_with_fallback() {
            local pkg="$1"
            if rpm -q "$pkg" &>/dev/null; then
              echo "$pkg already installed"
              return 0
            fi
            if tdnf install -y "$pkg" 2>&1; then return 0; fi
            echo "::warning::tdnf install $pkg failed; retrying with --allowerasing --refresh"
            if tdnf install -y --allowerasing --refresh "$pkg" 2>&1; then
              echo "::notice::Installed $pkg with --allowerasing (orphan dependent removed)"
              return 0
            fi
            echo "::error::All install paths for $pkg exhausted"
            return 1
          }

          rc=0
          for pkg in cmake gcc libsolv-devel rpm-devel curl-devel openssl-devel \
                     sqlite-devel tdnf-devel libxml2-devel gpgme-devel jq; do
            install_with_fallback "$pkg" || rc=$?
          done
          exit $rc

      - name: Clone and build tdnf with depgraph extension
        run: |
          TDNF_VER=$(tdnf --version | awk '{print $NF}')
          echo "Building against tdnf v${TDNF_VER}"
          git clone --depth 1 --branch "v${TDNF_VER}" \
            https://github.com/vmware/tdnf.git tdnf-src 2>/dev/null || \
          git clone --depth 1 https://github.com/vmware/tdnf.git tdnf-src

          SRC="ci/tdnf-depgraph/src"

          # New source files
          cp "$SRC/solv_tdnfdepgraph.c"  tdnf-src/solv/tdnfdepgraph.c
          cp "$SRC/client_depgraph.c"    tdnf-src/client/depgraph.c
          cp "$SRC/client_specparse.c"   tdnf-src/client/specparse.c
          cp "$SRC/cli_depgraph.c"       tdnf-src/tools/cli/lib/depgraph.c

          # Patch headers (append type defs, API, CLI, solv prototypes)
          python3 << 'PYEOF'
          import re, textwrap

          def patch_before_closing(path, insert, sentinel='#ifdef __cplusplus\n}\n#endif'):
              with open(path) as f:
                  content = f.read()
              content = content.replace(sentinel, insert + '\n\n' + sentinel, 1)
              with open(path, 'w') as f:
                  f.write(content)

          # tdnftypes.h - add struct definitions
          with open('ci/tdnf-depgraph/src/tdnftypes_depgraph.h') as f:
              raw = f.read()
          block = re.search(r'/\* ---- begin depgraph.*?/\* ---- end depgraph types ---- \*/', raw, re.DOTALL)
          patch_before_closing('tdnf-src/include/tdnftypes.h', block.group())

          # tdnf.h - add API
          api = textwrap.dedent("""
          // depgraph.c
          uint32_t TDNFDepGraph(PTDNF pTdnf, PTDNF_DEP_GRAPH *ppGraph);
          void TDNFFreeDepGraph(PTDNF_DEP_GRAPH pGraph);
          // specparse.c
          uint32_t TDNFBuildDepGraphFromSpecs(const char *pszSpecsDir, PTDNF_DEP_GRAPH *ppGraph);
          """).strip()
          patch_before_closing('tdnf-src/include/tdnf.h', api)

          # tdnfcli.h - add CLI commands
          cli = textwrap.dedent("""
          uint32_t TDNFCliDepGraphCommand(PTDNF_CLI_CONTEXT pContext, PTDNF_CMD_ARGS pCmdArgs);
          uint32_t TDNFCliInvokeDepGraph(PTDNF_CLI_CONTEXT pContext, PTDNF_DEP_GRAPH *ppGraph);
          """).strip()
          patch_before_closing('tdnf-src/include/tdnfcli.h', cli)

          # solv/prototypes.h - add solv prototypes
          proto = textwrap.dedent("""
          uint32_t SolvBuildDepGraph(PSolvSack pSack, PTDNF_DEP_GRAPH *ppGraph);
          void SolvFreeDepGraph(PTDNF_DEP_GRAPH pGraph);
          """).strip()
          patch_before_closing('tdnf-src/solv/prototypes.h', proto)
          PYEOF

          # Patch CMakeLists
          sed -i 's/simplequery\.c$/simplequery.c\n    tdnfdepgraph.c/' tdnf-src/solv/CMakeLists.txt
          sed -i 's/varsdir\.c$/varsdir.c\n    depgraph.c\n    specparse.c/' tdnf-src/client/CMakeLists.txt
          sed -i 's/updateinfocmd\.c$/updateinfocmd.c\n    depgraph.c/' tdnf-src/tools/cli/lib/CMakeLists.txt

          # Patch dispatch table
          sed -i '/"count",.*TDNFCliCountCommand/a\    {"depgraph",           TDNFCliDepGraphCommand, false},' tdnf-src/tools/cli/main.c

          # Build (use pipefail so a make failure isn't masked by tail)
          set -o pipefail
          cd tdnf-src && mkdir -p build && cd build
          cmake .. -Wno-dev 2>&1 | tail -3
          make -j$(nproc) 2>&1 | tee /tmp/tdnf-build.log | tail -5
          if [ ! -x bin/tdnf ]; then
            echo "::error::tdnf binary not produced — see /tmp/tdnf-build.log"
            exit 1
          fi
          echo "Build complete: $(./bin/tdnf --version 2>&1 | head -1)"

      - name: Clone vmware/photon branches and generate dependency graphs
        id: generate
        run: |
          DATETIME=$(date -u +%Y%m%d_%H%M%S)
          echo "datetime=$DATETIME" >> "$GITHUB_OUTPUT"

          BRANCHES="${{ github.event.inputs.branches || '3.0,4.0,5.0,6.0,common,master,dev' }}"
          TDNF="tdnf-src/build/bin/tdnf"
          TDNF_ENV="LD_LIBRARY_PATH=tdnf-src/build/lib"

          mkdir -p /tmp/depgraph-scans

          echo "## Dependency Graph Scan" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          # Per FRD-cycle-detection §2.6 (task 014). Edge-type counts
          # (Requires/BuildRequires/Conflicts) are now derivable from the
          # v2 artifact JSON; the summary surfaces actionable cycle counts
          # instead so reviewers see status without opening artifacts.
          echo "| Branch | Flavor | Specs | Nodes | Edges | Cycles | BR-Cycles | Self-loops | Unresolved | Bootstrap-Resolved | File |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|--------|-------|-------|-------|--------|-----------|------------|------------|--------------------|------|" >> "$GITHUB_STEP_SUMMARY"
          # Cycle-block accumulator (rendered after the table at end of step).
          : > /tmp/cycle-blocks.md

          for BRANCH in $(echo "$BRANCHES" | tr ',' ' '); do
            SAFE_BRANCH=$(echo "$BRANCH" | tr '/' '-')
            CLONE_DIR="/tmp/photon-clone-${SAFE_BRANCH}"

            echo "=== Branch: ${BRANCH} ==="

            # Clone only the SPECS directory from vmware/photon
            if [ ! -d "$CLONE_DIR" ]; then
              git clone --depth 1 --branch "$BRANCH" --filter=blob:none --sparse \
                https://github.com/vmware/photon.git "$CLONE_DIR" 2>&1 | tail -1
              cd "$CLONE_DIR" && git sparse-checkout set SPECS && cd -
            fi

            if [ ! -d "${CLONE_DIR}/SPECS" ]; then
              echo "  No SPECS/ dir on this branch"
              echo "| ${BRANCH} | - | 0 | - | - | - | - | - | - | - | skipped |" >> "$GITHUB_STEP_SUMMARY"
              continue
            fi

            # Discover sub-release flavors per FRD-subrelease-flavors §2.1:
            # base (empty token) + each SPECS/[0-9]+/ subdir found.
            # Per ADR-0002 the list is dynamic -- no hardcoded 90/91/92.
            # Use a pure-bash glob instead of `find -regex -printf`: the
            # self-hosted runner ships a toybox/bfs `find` that rejects
            # GNU-style -regex (`find: bad arg '.*/SPECS/[0-9]+'`).
            FLAVORS=("")
            mapfile -t _NUMERIC < <(
              shopt -s nullglob
              for _entry in "${CLONE_DIR}/SPECS"/*/; do
                _name="${_entry%/}"; _name="${_name##*/}"
                [[ "$_name" =~ ^[0-9]+$ ]] && printf '%s\n' "$_name"
              done | sort
            )
            FLAVORS+=("${_NUMERIC[@]}")
            unset _NUMERIC
            echo "  Flavors: [${FLAVORS[*]}]  (${#FLAVORS[@]} total)"

            for FLAVOR in "${FLAVORS[@]}"; do
              # Resolve flavor-dependent paths and filename token. Per the repo
              # owner's 2026-05-13 decision: unflavored branches keep the v1
              # filename so existing consumers do not break.
              if [ -z "$FLAVOR" ]; then
                SPECS_DIR="${CLONE_DIR}/SPECS"
                FILE_TOKEN="${SAFE_BRANCH}"
                SPECSDIR_META="SPECS"
                FLAVOR_LABEL="-"
              else
                SPECS_DIR="/tmp/photon-overlay-${SAFE_BRANCH}-${FLAVOR}"
                FILE_TOKEN="${SAFE_BRANCH}-${FLAVOR}"
                SPECSDIR_META="SPECS+SPECS/${FLAVOR}"
                FLAVOR_LABEL="${FLAVOR}"
                # Overlay assembly per FRD-subrelease-flavors §2.2: copy the
                # contents of SPECS/ into the overlay, then overlay SPECS/<F>/
                # on top. cp -a "X/." copies contents, so same-name files
                # from the second source overwrite the base.
                rm -rf "$SPECS_DIR"
                mkdir -p "$SPECS_DIR"
                cp -a "${CLONE_DIR}/SPECS/." "$SPECS_DIR/"
                cp -a "${CLONE_DIR}/SPECS/${FLAVOR}/." "$SPECS_DIR/"
              fi

              FILENAME="dependency-graph-${FILE_TOKEN}-${DATETIME}.json"
              OUTPATH="/tmp/depgraph-scans/${FILENAME}"

              SPEC_COUNT=$(find "$SPECS_DIR" -name '*.spec' 2>/dev/null | wc -l)
              echo "  - Flavor ${FLAVOR_LABEL}: ${SPEC_COUNT} specs -> ${FILENAME}"

              if [ "$SPEC_COUNT" -eq 0 ]; then
                echo "| ${BRANCH} | ${FLAVOR_LABEL} | 0 | - | - | - | - | - | - | - | skipped |" >> "$GITHUB_STEP_SUMMARY"
                continue
              fi

              # Generate depgraph from spec files (capture stderr to a log).
              # --setopt flavor=<F> is consumed by the cycle pass in task 014;
              # the C extension ignores unknown --setopt keys, so this is safe
              # to pass today.
              ERR_LOG="/tmp/depgraph-${FILE_TOKEN}.err"
              env $TDNF_ENV $TDNF depgraph --json \
                --setopt specsdir="$SPECS_DIR" \
                --setopt branch="${BRANCH}" \
                --setopt flavor="${FLAVOR}" 2>"$ERR_LOG" > "$OUTPATH" || {
                echo "::warning::tdnf depgraph failed for ${BRANCH}/${FLAVOR_LABEL} (exit $?), stderr:"
                tail -20 "$ERR_LOG"
              }

              # Validate and extract base node/edge counts from the v1 JSON.
              STATS=$(python3 -c "
          import json
          with open('${OUTPATH}') as f:
              d = json.load(f)
          print(f\"{d['node_count']} {d['edge_count']}\")
          " 2>/dev/null)

              if [ -z "$STATS" ]; then
                echo "    -> FAILED to parse output"
                echo "| ${BRANCH} | ${FLAVOR_LABEL} | ${SPEC_COUNT} | - | - | - | - | - | - | - | failed |" >> "$GITHUB_STEP_SUMMARY"
                rm -f "$OUTPATH"
                continue
              fi
              read NODES EDGES <<< "$STATS"
              echo "    -> ${NODES} nodes, ${EDGES} edges"

              # --- Cycle pass (task 014) -------------------------------------
              # Run depgraph_cycles.py in-place: rewrites the JSON to schema v2
              # with sccs[], cycles[], cycle_summary{}. The engine is preq-aware:
              # missing data/builder-pkg-preq.json is logged WARN and treated as
              # empty (every cycle conservatively classified bootstrap_resolved
              # = false per ADR-0005). Engine never propagates a non-zero exit
              # for the empty-graph or missing-preq cases; only argparse or I/O
              # errors fail. Per task 014 IN: surface those as ::error::
              # annotations but do NOT fail the job (task 015 owns the gate).
              PREQ_PATH="${CLONE_DIR}/data/builder-pkg-preq.json"
              CYCLES_LOG="/tmp/depgraph-cycles-${FILE_TOKEN}.err"
              CYCLES_OK=1
              PREQ_ARGS=()
              [ -f "$PREQ_PATH" ] && PREQ_ARGS=(--preq "$PREQ_PATH")
              # The workflow's sparse checkout puts tdnf-depgraph at ci/ (see
              # the "Checkout CI tooling (sparse)" step). $GITHUB_WORKSPACE's
              # root has no tdnf-depgraph/ directly -- run 25797494578
              # failed with "No such file or directory" by using that path.
              if ! python3 ci/tdnf-depgraph/tools/depgraph_cycles.py \
                   --input "$OUTPATH" "${PREQ_ARGS[@]}" \
                   --flavor "$FLAVOR" --specsdir-meta "$SPECSDIR_META" \
                   2>"$CYCLES_LOG"; then
                echo "::error::cycle engine failed for ${BRANCH}/${FLAVOR_LABEL}"
                tail -20 "$CYCLES_LOG" || true
                CYCLES_OK=0
              fi
              # Engine WARNs to stderr if the preq file is missing; promote to
              # a one-shot workflow annotation per AC of task 014.
              if grep -q '^WARN: preq file' "$CYCLES_LOG" 2>/dev/null; then
                echo "::warning::data/builder-pkg-preq.json missing for ${BRANCH}/${FLAVOR_LABEL}; cycles classified conservatively (bootstrap_resolved=false)"
              fi

              # Parse the engine's one-line stderr summary into table values.
              CYC="-"; BRC="-"; SLF="-"; UNR="-"; BST="-"
              SUMMARY_LINE=$(grep '^cyc-engine:' "$CYCLES_LOG" 2>/dev/null | tail -1 || true)
              if [ -n "$SUMMARY_LINE" ]; then
                CYC=$(sed -n 's/.* cycles=\([0-9]*\).*/\1/p' <<<"$SUMMARY_LINE")
                BRC=$(sed -n 's/.* br=\([0-9]*\).*/\1/p'     <<<"$SUMMARY_LINE")
                SLF=$(sed -n 's/.* self=\([0-9]*\).*/\1/p'   <<<"$SUMMARY_LINE")
                UNR=$(sed -n 's/.* unresolved=\([0-9]*\).*/\1/p' <<<"$SUMMARY_LINE")
                BST=$(sed -n 's/.* bootstrap=\([0-9]*\).*/\1/p'  <<<"$SUMMARY_LINE")
              fi
              if [ "$CYCLES_OK" = "0" ]; then
                CYC="?"; BRC="?"; SLF="?"; UNR="?"; BST="?"
              fi
              echo "    -> cycles=${CYC} br=${BRC} self=${SLF} unresolved=${UNR} bootstrap=${BST}"
              echo "| ${BRANCH} | ${FLAVOR_LABEL} | ${SPEC_COUNT} | ${NODES} | ${EDGES} | ${CYC} | ${BRC} | ${SLF} | ${UNR} | ${BST} | \`${FILENAME}\` |" >> "$GITHUB_STEP_SUMMARY"

              # Per-(branch,flavor) representative-cycles block (up to 10).
              # Path truncation per FRD §2.6: when path_names has more than 9
              # elements (i.e. cycle length > 8 hops), render as
              # "first-3 → … → last-2". jq is now a build-deps prerequisite.
              if [ "$CYCLES_OK" = "1" ] && [ "${CYC:-0}" != "0" ] && [ "$CYC" != "-" ] && [ "$CYC" != "?" ]; then
                TOTAL=$(jq '.cycles | length' "$OUTPATH")
                SHOWING=$(( TOTAL < 10 ? TOTAL : 10 ))
                {
                  echo ""
                  echo "#### ${BRANCH} / ${FLAVOR_LABEL} — representative cycles (${TOTAL} found, showing ${SHOWING})"
                  jq -r '
                    def fmt_path:
                      if length > 9 then
                        (.[0:3] | join(" → ")) + " → … → " + (.[-2:] | join(" → "))
                      else
                        join(" → ")
                      end;
                    .cycles[:10][]
                    | "- \(.id) (\(.category), \(if .bootstrap_resolved then "bootstrap-resolved" else "unresolved" end)): \(.path_names | fmt_path)"
                  ' "$OUTPATH"
                } >> /tmp/cycle-blocks.md
              fi
              # --------------------------------------------------------------
            done
          done

          FILE_COUNT=$(ls /tmp/depgraph-scans/*.json 2>/dev/null | wc -l)
          echo "file_count=$FILE_COUNT" >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Total**: ${FILE_COUNT} graphs generated at ${DATETIME}" >> "$GITHUB_STEP_SUMMARY"
          # Per FRD §2.6: cycle blocks rendered after the summary table.
          if [ -s /tmp/cycle-blocks.md ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### Representative cycles" >> "$GITHUB_STEP_SUMMARY"
            cat /tmp/cycle-blocks.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload artifacts
        if: steps.generate.outputs.file_count != '0'
        uses: actions/upload-artifact@v7
        with:
          name: dependency-graphs
          path: /tmp/depgraph-scans/*.json
          retention-days: 90

      - name: Commit to scans directory
        if: steps.generate.outputs.file_count != '0'
        run: |
          SCANS_DIR="repo/tdnf-depgraph/scans"
          mkdir -p "$SCANS_DIR"
          cp /tmp/depgraph-scans/*.json "$SCANS_DIR/"

          cd repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tdnf-depgraph/scans/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            DATETIME="${{ steps.generate.outputs.datetime }}"
            FILE_COUNT="${{ steps.generate.outputs.file_count }}"
            git commit -m "Add dependency graph scans (${FILE_COUNT} branches, ${DATETIME})"
            # Other workflows commit to scans/ in parallel; rebase before push
            # to avoid the "fetch first" rejection that previously failed this step.
            git pull --rebase origin master
            git push
          fi

      - name: Cleanup
        if: always()
        run: rm -rf tdnf-src /tmp/depgraph-scans /tmp/photon-clone-* /tmp/photon-overlay-* /tmp/depgraph-cycles-*.err /tmp/cycle-blocks.md
