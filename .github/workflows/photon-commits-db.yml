name: Photon Commits Database

on:
  workflow_dispatch:
    inputs:
      branches:
        description: 'Branches to import (space-separated)'
        default: '3.0 4.0 5.0 6.0 common master'
      since_date:
        description: 'Only import commits after this date (ISO or git date format, empty = all history)'
        default: ''
      seed_from_local:
        description: 'Seed DB from existing local docsystem/photon_commits.db if present'
        type: boolean
        default: true
  schedule:
    # Weekly incremental import on Monday at 04:00 UTC
    - cron: '0 4 * * 1'

jobs:
  import-commits:
    runs-on: self-hosted
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          path: repo

      - name: Ensure Python and tqdm
        run: |
          python3 --version
          python3 -m pip install --quiet tqdm 2>/dev/null || \
            python3 -m pip install --quiet --user tqdm

      - name: Seed database from local copy
        id: seed
        run: |
          LOCAL_DB="$HOME/photonos-scripts/docsystem/photon_commits.db"
          SEED="${{ github.event.inputs.seed_from_local }}"
          if [ "$SEED" != "false" ] && [ -f "$LOCAL_DB" ] && [ ! -f photon_commits.db ]; then
            echo "Seeding from existing local database ($(du -h "$LOCAL_DB" | cut -f1))..."
            cp "$LOCAL_DB" photon_commits.db
            echo "seeded=true" >> "$GITHUB_OUTPUT"
          else
            echo "Starting with empty database"
            echo "seeded=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload seed database as initial artifact
        if: steps.seed.outputs.seeded == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: photon-commits-db-seed
          path: photon_commits.db
          retention-days: 90

      - name: Check database status (pre-import)
        run: |
          python3 repo/docsystem/.factory/skills/photon-import/importer.py \
            --db-path photon_commits.db \
            --check

      - name: Import commits
        run: |
          BRANCHES="${{ github.event.inputs.branches || '3.0 4.0 5.0 6.0 common master' }}"
          SINCE="${{ github.event.inputs.since_date }}"

          ARGS="--db-path photon_commits.db --repo-dir photon --branches $BRANCHES"
          if [ -n "$SINCE" ]; then
            ARGS="$ARGS --since-date $SINCE"
          fi

          python3 repo/docsystem/.factory/skills/photon-import/importer.py $ARGS

      - name: Check database status (post-import)
        id: post
        run: |
          python3 repo/docsystem/.factory/skills/photon-import/importer.py \
            --db-path photon_commits.db \
            --check | tee db-status.json

      - name: Generate summary
        if: always()
        run: |
          python3 << 'SUMMARY_EOF'
          import json, os

          status = {}
          if os.path.exists('db-status.json'):
              status = json.load(open('db-status.json'))

          branches = status.get('branches', {})
          summaries = status.get('summaries', {})

          summary_path = os.environ.get('GITHUB_STEP_SUMMARY', '/dev/null')
          with open(summary_path, 'a') as s:
              s.write("# Photon Commits Database\n\n")

              total = sum(b.get('commits', 0) for b in branches.values())
              s.write(f"**Total commits**: {total:,}  \n")
              s.write(f"**DB path**: `photon_commits.db`\n\n")

              if branches:
                  s.write("## Branch Status\n\n")
                  s.write("| Branch | Commits | Latest Commit |\n")
                  s.write("|--------|---------|---------------|\n")
                  for name in sorted(branches):
                      info = branches[name]
                      latest = (info.get('latest') or 'N/A')[:19]
                      s.write(f"| {name} | {info.get('commits', 0):,} | {latest} |\n")
                  s.write("\n")

              s.write("---\n*Database available in the `photon-commits-db` artifact.*\n")
          SUMMARY_EOF

      - name: Upload photon_commits.db
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: photon-commits-db
          path: photon_commits.db
          retention-days: 90
          if-no-files-found: warn
